<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Varmeta Data flow Animation</title>
  
  <!-- Premium Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Wix+Madefor+Text:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
  
  <style>
    /* Styling System - White Mode (Light Mode Only) */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #ffffff; /* colorsBackgroundNeutralsBgPrimary */
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .viewport-wrapper {
      position: relative;
      width: 100%;
      max-width: 675px;
      max-height: 323px;
      aspect-ratio: 675 / 323;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .animation-svg {
      width: 100%;
      height: 100%;
      display: block;
    }
    
    /* Static vector styles */
    .flow-line {
      fill: none;
      stroke: #eaeaea; /* colorsBorderNeutralsBdSecondary */
      stroke-width: 2;
      stroke-linecap: round;
    }
    
    .cyan-pipeline {
      fill: none;
      stroke: #d9f0ff; /* colorsBorderBrandsBdBrandTertiary */
      stroke-width: 2;
      stroke-linecap: round;
    }
    
    /* Dynamic Surge Pulse style */
    .surge-pulse {
      /* Managed in Javascript loop for 100% cross-browser reliability */
    }
    
    /* ── Data Filter Status Badge ── */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #ffffff;
      border: 2px solid #eaeaea; /* colorsBorderNeutralsBdSecondary */
      border-radius: 8px; /* var(--radius-md) */
      padding: 6px 12px;
      box-shadow: 0 4px 12px rgba(10, 12, 18, 0.04), 0 2px 4px rgba(10, 12, 18, 0.02);
      box-sizing: border-box;
      height: 36px;
      width: auto;
      white-space: nowrap;
      transition: width 0.18s cubic-bezier(0.25, 1, 0.5, 1);
      overflow: hidden;
    }
    
    .status-text-wrapper {
      display: inline-flex;
      align-items: center;
      white-space: nowrap;
    }
    
    .status-text {
      font-family: 'Wix Madefor Text', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: #797979; /* colorsTextNeutralsTextQuaternary */
      line-height: 1;
      white-space: nowrap;
      display: inline-block;
    }
    
    .cursor {
      display: inline-block;
      width: 8px;
      height: 2px;
      background-color: #797979; /* colorsTextNeutralsTextQuaternary */
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
      opacity: 0;
      transition: opacity 0.15s ease;
    }
    
    .cursor.active {
      opacity: 1;
    }
    
    @keyframes blink {
      from, to { background-color: transparent }
      50% { background-color: #797979; }
    }
    
    .spinner {
      width: 16px;
      height: 16px;
      animation: spin 1s linear infinite;
      flex-shrink: 0;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="viewport-wrapper">
    <svg class="animation-svg" viewBox="0 0 675 323" xmlns="http://www.w3.org/2000/svg" id="svg-viewport">
      <defs>
        <!-- Blue Surge Gradient (symmetric solid blue fade) -->
        <linearGradient id="surge-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#1078f3" stop-opacity="0" />
          <stop offset="50%" stop-color="#1078f3" stop-opacity="1" />
          <stop offset="100%" stop-color="#1078f3" stop-opacity="0" />
        </linearGradient>
        
        <!-- Left Fade Overlay Gradient -->
        <linearGradient id="left-fade" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#ffffff" stop-opacity="1" />
          <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
        </linearGradient>
        
        <!-- Right Fade Overlay Gradient -->
        <linearGradient id="right-fade" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#ffffff" stop-opacity="0" />
          <stop offset="100%" stop-color="#ffffff" stop-opacity="1" />
        </linearGradient>
      </defs>
      
      <!-- Static Grey Input Channels -->
      <!-- Path 1 (Top Curve) -->
      <path id="path1" class="flow-line" d="M 0 57 H 204.275 C 368.41 57, 235.238 163, 408.119 163 H 411" />
      
      <!-- Path 2 (Upper Middle Curve) -->
      <path id="path2" class="flow-line" d="M 0 110 H 204.275 C 368.41 110, 235.238 163, 408.119 163 H 411" />
      
      <!-- Path 3 (Middle Straight Line) -->
      <path id="path3" class="flow-line" d="M 0 163 H 411" />
      
      <!-- Path 4 (Lower Middle Curve) -->
      <path id="path4" class="flow-line" d="M 0 216 H 204.275 C 368.41 216, 235.238 163, 408.119 163 H 411" />
      
      <!-- Path 5 (Bottom Curve) -->
      <path id="path5" class="flow-line" d="M 0 269 H 204.275 C 368.41 269, 235.238 163, 408.119 163 H 411" />
      
      <!-- Funnel output pipeline (Cyan Line) -->
      <path id="path-cyan" class="cyan-pipeline" d="M 411 163 H 675" />
      
      <!-- Groups for dynamic elements -->
      <g id="particles-group"></g>
      <g id="surges-group"></g>
      
      <!-- HTML Status Badge inside SVG for perfect auto-scaling -->
      <foreignObject x="362" y="145" width="220" height="44" style="overflow: visible;">
        <div class="status-badge" id="status-badge" xmlns="http://www.w3.org/1999/xhtml">
          <svg class="spinner" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="8" cy="8" r="6" stroke="#eaeaea" stroke-width="2"/>
            <path d="M 8 2 A 6 6 0 0 1 14 8" stroke="#1078f3" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <div class="status-text-wrapper">
            <span class="status-text" id="status-text">Categorizing</span><span class="cursor"></span>
          </div>
        </div>
      </foreignObject>
      
      <!-- Inline Scaling Masks (71px wide overlays matching Figma dimensions) -->
      <rect x="0" y="0" width="71" height="323" fill="url(#left-fade)" pointer-events="none" />
      <rect x="604" y="0" width="71" height="323" fill="url(#right-fade)" pointer-events="none" />
    </svg>
  </div>

  <script>
     const svgViewport = document.getElementById('svg-viewport');
     const particlesGroup = document.getElementById('particles-group');
     const surgesGroup = document.getElementById('surges-group');
     const burstsGroup = document.getElementById('bursts-group');
    
    // Path Cache Elements & Length Cache
    const paths = [
      { element: document.getElementById('path1'), length: 0 },
      { element: document.getElementById('path2'), length: 0 },
      { element: document.getElementById('path3'), length: 0 },
      { element: document.getElementById('path4'), length: 0 },
      { element: document.getElementById('path5'), length: 0 }
    ];
    
    // Initialize Path Lengths
    paths.forEach(p => {
      p.length = p.element.getTotalLength();
    });

    const currentBaseSpeed = 0.0028; // Elegant fluid speed
    const spawnInterval = 1400; // Continuous staggered flow
    
    let particles = [];
    const SHAPES = ['circle', 'square', 'diamond'];
    
    class Particle {
      constructor(pathIndex, initialProgress = 0) {
        this.pathIndex = pathIndex;
        this.pathObj = paths[pathIndex];
        this.progress = initialProgress;
        
        // Randomize speed slightly around base speed (0.9x to 1.1x) for organic offset
        const speedRand = 0.9 + Math.random() * 0.2;
        this.speed = currentBaseSpeed * speedRand;
        
        // Choose shape based on path to match illustration layout:
        // Path 0: Circle, Path 1: Square, Path 2: Diamond, Path 3: Circle, Path 4: Square
        const pathShapes = ['circle', 'square', 'diamond', 'circle', 'square'];
        this.shapeType = pathShapes[pathIndex];
        
        this.size = 12; // Figma node size
        this.domElement = this.createDOMElement();
        particlesGroup.appendChild(this.domElement);
      }
      
      createDOMElement() {
        const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        let shape;
        
        if (this.shapeType === 'circle') {
          shape = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
          shape.setAttribute('r', (this.size / 2).toString());
        } else if (this.shapeType === 'square') {
          shape = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
          shape.setAttribute('x', (-this.size / 2).toString());
          shape.setAttribute('y', (-this.size / 2).toString());
          shape.setAttribute('width', this.size.toString());
          shape.setAttribute('height', this.size.toString());
          shape.setAttribute('rx', '2.5');
        } else if (this.shapeType === 'diamond') {
          shape = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
          shape.setAttribute('x', (-this.size / 2).toString());
          shape.setAttribute('y', (-this.size / 2).toString());
          shape.setAttribute('width', this.size.toString());
          shape.setAttribute('height', this.size.toString());
          shape.setAttribute('rx', '2.5');
          shape.setAttribute('transform', 'rotate(45)');
        }
        
        // colorsIconNeutralsIconDisabled: rgba(77, 77, 77, 0.35)
        shape.setAttribute('fill', 'rgba(77, 77, 77, 0.35)');
        g.appendChild(shape);
        return g;
      }
      
      update() {
        this.progress += this.speed;
        
        if (this.progress >= 1) {
          this.destroy();
          return false;
        }
        
        const pt = this.pathObj.element.getPointAtLength(this.progress * this.pathObj.length);
        
        // Scale and Fade out to 0 in the last 8% of the path (nearing the cyan line)
        let scale = 1;
        let opacity = 1;
        if (this.progress > 0.92) {
          const fadeRatio = (1 - this.progress) / 0.08;
          scale = fadeRatio;
          opacity = fadeRatio;
        }
        
        this.domElement.setAttribute('transform', `translate(${pt.x}, ${pt.y}) scale(${scale})`);
        this.domElement.style.opacity = opacity.toString();
        return true;
      }
      
      destroy() {
        if (this.domElement && this.domElement.parentNode) {
          particlesGroup.removeChild(this.domElement);
        }
        
        // Pass the node's actual speed in pixels per frame to the surge
        const pixelSpeed = this.speed * paths[2].length;
        triggerSurge(pixelSpeed);
      }
    }

    let surges = [];


    // Dynamic surge rect creation
    function triggerSurge(speed) {
      const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      rect.setAttribute('width', '92');
      rect.setAttribute('height', '2');
      rect.setAttribute('y', '162'); // Centered on y=163
      rect.setAttribute('fill', 'url(#surge-gradient)');
      rect.style.opacity = '0';
      surgesGroup.appendChild(rect);
      
      surges.push({
        domElement: rect,
        x: 319,
        speed: speed // matches node speed exactly
      });
    }


    let lastSpawnTime = 0;

    // Animation Loop
    function animate(timestamp) {
      if (!lastSpawnTime) lastSpawnTime = timestamp;

      // Update particles
      particles = particles.filter(p => {
        return p.update();
      });
      
      // Update surges
      surges = surges.filter(s => {
        s.x += s.speed;
        
        if (s.x >= 675) {
          if (s.domElement && s.domElement.parentNode) {
            surgesGroup.removeChild(s.domElement);
          }
          return false;
        }
        
        // Fade in at start (319 to 350) and fade out at end (620 to 675)
        let opacity = 1;
        if (s.x < 350) {
          opacity = (s.x - 319) / 31;
        } else if (s.x > 620) {
          opacity = (675 - s.x) / 55;
        }
        
        s.domElement.setAttribute('transform', `translate(${s.x}, 0)`);
        s.domElement.style.opacity = opacity.toString();
        return true;
      });

      // Handle spawning inside animation loop to prevent background backlog
      if (timestamp - lastSpawnTime >= spawnInterval) {
        spawnParticle();
        lastSpawnTime = timestamp;
      }
      
      requestAnimationFrame(animate);
    }

    // Spawn loop
    function spawnParticle() {
      // Pick random path (0-4)
      const randomPathIdx = Math.floor(Math.random() * paths.length);
      particles.push(new Particle(randomPathIdx, 0));
    }

    // Initialize initial state matching illustration offsets:
    // Path 0: circle at 48% progress
    // Path 1: square at 31% progress
    // Path 2: diamond at 47% progress
    // Path 3: circle at 32% progress
    // Path 4: square at 18% progress
    particles.push(new Particle(0, 0.48));
    particles.push(new Particle(1, 0.31));
    particles.push(new Particle(2, 0.47));
    particles.push(new Particle(3, 0.32));
    particles.push(new Particle(4, 0.18));

    // Status text typewriter cycling logic to mimic an agent sorting data
    const statusTextEl = document.getElementById('status-text');
    const badgeEl = document.getElementById('status-badge');
    const cursorEl = document.querySelector('.cursor');
    const actions = [
      "Categorizing",
      "Structuring",
      "Filtering",
      "Normalizing",
      "Classifying",
      "Parsing"
    ];
    let actionIdx = 0;
    let currentText = "Categorizing";
    let oldWidth = 0;

    // Helper to update badge width smoothly
    function updateBadgeWidth() {
      badgeEl.style.width = 'auto';
      const newWidth = badgeEl.offsetWidth;
      badgeEl.style.width = oldWidth + 'px';
      badgeEl.offsetHeight; // Force reflow
      badgeEl.style.width = newWidth + 'px';
      oldWidth = newWidth;
    }

    // Set initial width
    setTimeout(() => {
      badgeEl.style.width = 'auto';
      oldWidth = badgeEl.offsetWidth;
      badgeEl.style.width = oldWidth + 'px';
    }, 100);

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function typewriterCycle() {
      // 1. Wait at the current text (faster: 1800ms)
      await sleep(1800);

      // Show cursor when beginning changes
      cursorEl.classList.add('active');

      const nextAction = actions[(actionIdx + 1) % actions.length];
      actionIdx = (actionIdx + 1) % actions.length;

      // 2. Erase phase (backspacing - faster: 30-45ms per character)
      while (currentText.length > 0) {
        currentText = currentText.slice(0, -1);
        statusTextEl.textContent = currentText;
        updateBadgeWidth();
        await sleep(30 + Math.random() * 15);
      }

      // Pause when empty (faster: 200ms)
      await sleep(200);

      // 3. Type phase (rewriting - faster: 50-80ms per character)
      for (let i = 0; i < nextAction.length; i++) {
        currentText += nextAction[i];
        statusTextEl.textContent = currentText;
        updateBadgeWidth();
        await sleep(50 + Math.random() * 30);
      }

      // Hide cursor when finished changing text
      cursorEl.classList.remove('active');

      // Loop again
      typewriterCycle();
    }

    // Start the typewriter sequence
    typewriterCycle();

    // Start Animation Loop (first frame receives the timestamp)
    requestAnimationFrame(animate);
  </script>
</body>
</html>
