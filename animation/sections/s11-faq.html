<style>
  /* ── FAQ ──────────────────────────────────────────────────────── */
  .faq {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 64px 32px;
    gap: 64px;
    background: var(--bg-primary);
    overflow: hidden;
  }
  .faq__grid-bg {
    position: absolute; inset: 0; pointer-events: none;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 128px 128px;
    -webkit-mask-image: radial-gradient(ellipse 80% 80% at 50% 0%, black 20%, transparent 75%);
    mask-image: radial-gradient(ellipse 80% 80% at 50% 0%, black 20%, transparent 75%);
    opacity: 0.3;
  }
  .faq__inner {
    position: relative;
    max-width: 1280px; width: 100%;
    display: grid;
    grid-template-columns: 1fr 2fr;
    gap: 80px;
  }
  .faq__left {
    display: flex; flex-direction: column; gap: 24px;
    position: sticky; top: 120px; align-self: start;
  }
  .faq__eyebrow {
    display: inline-flex; align-items: center;
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 100px;
    font-size: 13px; font-weight: 500; color: var(--text-secondary);
    width: fit-content;
  }
  .faq__title {
    font-family: var(--font-display); font-weight: 600; font-size: 48px;
    line-height: 58px; letter-spacing: -0.96px; color: var(--text-primary);
  }
  .faq__desc {
    font-size: 17px; line-height: 28px; color: var(--text-secondary);
  }
  .faq__cta-row {
    display: flex; flex-direction: column; gap: 12px; margin-top: 12px;
  }
  .faq__cta-btn {
    display: inline-flex; align-items: center; justify-content: center;
    padding: 14px 28px; border-radius: var(--radius-xl);
    font-weight: 600; font-size: 16px; cursor: pointer;
    transition: opacity 150ms ease;
  }
  .faq__cta-btn:hover { opacity: 0.85; }
  .faq__cta-btn--primary {
    background: var(--brand); color: #fff;
  }
  .faq__cta-btn--ghost {
    background: transparent; border: 1px solid var(--border); color: var(--text-primary);
  }

  /* Accordion */
  .faq__list {
    display: flex; flex-direction: column; gap: 0;
    border-top: 1px solid var(--border);
  }
  .faq-item {
    border-bottom: 1px solid var(--border);
    overflow: hidden;
  }
  .faq-item__trigger {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%; padding: 24px 0; gap: 24px;
    background: none; border: none; cursor: pointer;
    text-align: left;
  }
  .faq-item__q {
    font-family: var(--font-display); font-weight: 500; font-size: 18px;
    line-height: 28px; color: var(--text-primary); flex: 1;
  }
  .faq-item__icon {
    flex-shrink: 0; width: 24px; height: 24px;
    border: 1px solid var(--border); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    transition: transform 250ms ease, background 150ms ease, border-color 150ms ease;
    font-size: 16px; line-height: 1; color: var(--text-secondary);
  }
  .faq-item[open] .faq-item__icon {
    transform: rotate(45deg);
    background: var(--brand); border-color: var(--brand); color: #fff;
  }
  .faq-item__body {
    overflow: hidden;
    max-height: 0;
    transition: max-height 300ms ease, padding 300ms ease;
  }
  .faq-item[open] .faq-item__body {
    max-height: 600px;
  }
  .faq-item__a {
    padding: 0 24px 24px 0;
    font-size: 16px; line-height: 26px; color: var(--text-secondary);
  }
</style>

<section class="faq">
  <div class="faq__grid-bg" aria-hidden="true"></div>
  <div class="faq__inner">

    <div class="faq__left">
      <span class="faq__eyebrow">FAQ</span>
      <h2 class="faq__title">Answers to<br>Common Questions</h2>
      <p class="faq__desc">
        Have something else in mind? Our team is happy to walk through specifics with you on a discovery call.
      </p>
      <div class="faq__cta-row">
        <a href="#" class="faq__cta-btn faq__cta-btn--primary">Schedule a Strategy Call</a>
        <a href="#" class="faq__cta-btn faq__cta-btn--ghost">View Portfolio</a>
      </div>
    </div>

    <div class="faq__list" id="faq-list">
      <!-- items injected by JS below -->
    </div>

  </div>
</section>

<script>
(function () {
  var items = [
    {
      q: 'What industries does Varmeta specialise in?',
      a: 'We focus on high-complexity digital products across fintech, Web3, enterprise SaaS, and immersive tech (VR/AR). Our clients range from early-stage startups raising their seed round to publicly listed enterprises deploying production infrastructure.'
    },
    {
      q: 'How does the engagement typically begin?',
      a: 'We start with a free 30-minute strategy call to understand your goals, constraints, and timeline. From there we scope a discovery sprint (usually 1–2 weeks) that produces a technical architecture, roadmap, and fixed-price proposal before any long-term commitment.'
    },
    {
      q: 'Do you offer fixed-price or time-and-materials contracts?',
      a: 'Both. Greenfield projects and well-scoped features work well as fixed-price engagements. Ongoing product development, platform scaling, and ambiguous R&D phases are better suited to a monthly retainer with transparent time-and-materials billing.'
    },
    {
      q: 'What is your team size and capacity for a typical project?',
      a: 'A typical squad is 4–8 people: a project lead, 2–4 engineers, a QA specialist, and a product designer. We can scale up quickly — our talent pool spans 100+ full-stack developers across Hanoi and Da Nang.'
    },
    {
      q: 'How do you handle IP ownership and NDAs?',
      a: 'All IP created during an engagement is assigned to the client upon final payment. We sign NDAs before any discovery session and treat client data with enterprise-grade confidentiality practices.'
    },
    {
      q: 'What time zones do you work in?',
      a: 'Our core hours are GMT+7 (Vietnam), but we flex our overlap window to cover US Eastern, EU Central, and Japan Standard Time depending on the client. We have structured async practices so decisions never wait 24 hours for a response.'
    },
    {
      q: 'Can you take over an existing codebase?',
      a: 'Yes. We\'ve inherited codebases of all shapes and sizes. Our standard onboarding includes a two-week technical audit (architecture review, test coverage, security scan) that gives both sides a clear picture before we commit to velocity targets.'
    }
  ];

  var list = document.getElementById('faq-list');

  items.forEach(function (item, i) {
    var el = document.createElement('div');
    el.className = 'faq-item';
    el.innerHTML =
      '<button class="faq-item__trigger" aria-expanded="false" aria-controls="faq-body-' + i + '">' +
        '<span class="faq-item__q">' + item.q + '</span>' +
        '<span class="faq-item__icon" aria-hidden="true">+</span>' +
      '</button>' +
      '<div class="faq-item__body" id="faq-body-' + i + '">' +
        '<p class="faq-item__a">' + item.a + '</p>' +
      '</div>';

    var trigger = el.querySelector('.faq-item__trigger');
    trigger.addEventListener('click', function () {
      var isOpen = el.hasAttribute('open');
      // Close all
      list.querySelectorAll('.faq-item[open]').forEach(function (other) {
        other.removeAttribute('open');
        other.querySelector('.faq-item__trigger').setAttribute('aria-expanded', 'false');
      });
      // Toggle clicked
      if (!isOpen) {
        el.setAttribute('open', '');
        trigger.setAttribute('aria-expanded', 'true');
      }
    });

    list.appendChild(el);
  });
})();
</script>
