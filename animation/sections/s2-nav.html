<style>
  /* ── Sticky Nav ───────────────────────────────────────────────── */
  .sticky-nav {
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px;
    background: transparent;
    pointer-events: none;
  }
  .sticky-nav__pill {
    display: flex;
    align-items: center;
    gap: 32px;
    max-width: 1280px;
    width: 100%;
    background: rgba(255,255,255,0.8);
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    padding: 16px 16px 16px 32px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    pointer-events: auto;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .sticky-nav__brand {
    display: flex; align-items: center; gap: 6px; flex-shrink: 0;
  }
  .sticky-nav__brand img { height: 24px; width: auto; }
  .sticky-nav__links {
    display: flex; gap: 16px; flex: 1;
    font-family: var(--font-display); font-weight: 500; font-size: 16px;
    color: var(--text-primary); white-space: nowrap;
    justify-content: center;
  }
  .sticky-nav__links a {
    color: inherit; line-height: 24px;
    transition: color 150ms ease;
  }
  .sticky-nav__links a:hover { color: var(--brand); }
  .sticky-nav__cta {
    display: flex; align-items: center; justify-content: center;
    padding: 12px 18px; background: var(--brand);
    color: #fff; font-family: var(--font-body); font-weight: 500; font-size: 16px;
    border: 2px solid rgba(255,255,255,0.12); border-radius: var(--radius-md);
    cursor: pointer; transition: background 180ms ease; white-space: nowrap; flex-shrink: 0;
  }
  .sticky-nav__cta:hover { background: var(--brand-dark); }
</style>

<header class="sticky-nav">
  <div class="sticky-nav__pill">
    <div class="sticky-nav__brand">
      <img src="https://www.figma.com/api/mcp/asset/68508d81-c2e0-4878-a8d5-6b7a38ba4dc9" alt="">
      <img src="https://www.figma.com/api/mcp/asset/62731a4d-7eeb-49af-9e49-61b95fe6f01e" alt="Varmeta">
    </div>
    <nav class="sticky-nav__links">
      <a href="#">About Us</a>
      <a href="#">Services</a>
      <a href="#">Our Solutions</a>
      <a href="#">Resources</a>
      <a href="#">Portfolio</a>
      <a href="#">Blog</a>
      <a href="#">Careers</a>
    </nav>
    <button class="sticky-nav__cta">Consult Expert</button>
  </div>
</header>
