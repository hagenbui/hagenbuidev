<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Varmeta Agent Workspace Simulation</title>
  
  <!-- Premium Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Wix+Madefor+Text:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
  
  <style>
    /* Styling System & Primitives from tokens.json */
    :root {
      --bg-primary: #ffffff;             /* colorsBackgroundNeutralsBgPrimary */
      --bg-secondary: #fafafa;           /* colorsBackgroundNeutralsBgSecondary */
      --bg-badge: rgba(51, 51, 51, 0.05); /* colorsBackgroundNeutralsBgDisabled */
      --bg-terminal: #fafafa;            /* matches second bg */
      --bg-term-header: #f2f2f2;         /* colorsBackgroundNeutralsBgTertiary */
      
      --border-outer: #d7d7d7;           /* colorsBorderNeutralsBdPrimary */
      --border-inner: #f2f2f2;           /* colorsBorderNeutralsBdTertiary */
      --border-badge: #eaeaea;           /* colorsBorderNeutralsBdSecondary */
      --border-button: #d5d7da;          /* colorsBorderBorderPrimary */
      
      --text-primary: #1d1d1d;           /* colorsTextNeutralsTextPrimary */
      --text-secondary: #414651;         /* colorsTextTextSecondary-(700) */
      --text-tertiary: #5e5e5e;          /* colorsTextNeutralsTextTertiary */
      --text-quaternary: #797979;        /* colorsTextNeutralsTextQuaternary */
      
      --color-accent: #1078f3;           /* colorsIconBrandsIconBrandPrimary */
      --color-accent-glow: rgba(16, 120, 243, 0.08);
      
      --color-red: #f04437;              /* colorsSemanticError500 */
      --color-red-bg: #fef2f1;           /* light error background */
      --color-green: #17b169;            /* colorsSemanticSuccess500 */
      --color-green-bg: #ecfcf2;         /* light success background */
      
      --font-heading: 'Wix Madefor Text', sans-serif;
      --font-body: 'Wix Madefor Text', sans-serif;
      --font-mono: 'Fira Code', monospace;

      /* Responsive Layout Heights & Paddings (16px padding strictly enforced) */
      --outer-padding-left: 16px;
      --outer-padding-top: 16px;
      --inner-padding: 16px;
      --workspace-margin-top: 16px;
      
      --button-height: 38px;
      --button-margin-top: 16px;
      --changes-gap: 10px;
      
      --font-size-title: 20px;
      --font-size-body: 14px;
      --font-size-term: 11px;
      --status-meta-height: 28px;
    }

    /* Tablet Sized Breakpoint */
    @media (max-width: 580px) {
      :root {
        --outer-padding-left: 12px;
        --outer-padding-top: 12px;
        --inner-padding: 16px;
        --workspace-margin-top: 16px;
        
        --button-height: 34px;
        --button-margin-top: 14px;
        --changes-gap: 8px;
        
        --font-size-title: 18px;
        --font-size-body: 13px;
        --font-size-term: 10px;
        --status-meta-height: 26px;
      }
    }
    
    /* Mobile Sized Breakpoint */
    @media (max-width: 440px) {
      :root {
        --outer-padding-left: 8px;
        --outer-padding-top: 8px;
        --inner-padding: 16px;
        --workspace-margin-top: 16px;
        
        --button-height: 30px;
        --button-margin-top: 10px;
        --changes-gap: 6px;
        
        --font-size-title: 16px;
        --font-size-body: 12px;
        --font-size-term: 9px;
        --status-meta-height: 24px;
      }
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: var(--bg-primary);
      margin: 0;
      padding: 0;
    }
    
    /* Edge-touching Outer Card Layout (No Shadows, Cropped Borders & Corner Radii) */
    .outer-card {
      width: 100%;
      height: 100%;
      background-color: var(--bg-secondary);
      border-left: 1px solid var(--border-outer);
      border-top: 1px solid var(--border-outer);
      border-top-left-radius: 16px;
      /* Cropped: No border-right, border-bottom, or other corner radii */
      padding-left: var(--outer-padding-left);
      padding-top: var(--outer-padding-top);
      display: flex;
      flex-direction: column;
      position: relative;
    }
    
    /* Inner Card: Active workspace (Cropped Borders & Corner Radii, 16px padding strictly enforced) */
    .inner-card {
      background-color: var(--bg-primary);
      border-left: 1px solid var(--border-inner);
      border-top: 1px solid var(--border-inner);
      border-top-left-radius: 8px;
      /* Cropped: No border-right, border-bottom, or other corner radii */
      padding: var(--inner-padding);
      display: flex;
      flex-direction: column;
      gap: var(--workspace-margin-top);
      flex: 1;
      width: 100%;
      height: 100%;
      position: relative;
      overflow: hidden;
      transition: opacity 0.5s ease-in-out;
    }
    
    /* Stable Header Section: Prevents any vertical shifts */
    .header-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
    }
    
    .badge-row {
      display: flex;
      align-items: center;
      width: 100%;
      flex-shrink: 0;
    }
    
    .agent-badge {
      background-color: var(--bg-badge);
      border: 1px solid var(--border-badge);
      border-radius: 8px;
      padding: 4px 8px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    
    .badge-icon {
      width: 14px;
      height: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-quaternary);
    }
    
    .badge-text {
      font-family: var(--font-body);
      font-size: var(--font-size-body);
      line-height: 20px;
      font-weight: 500;
      color: var(--text-primary);
    }
    
    .status-header {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    
    .status-title {
      font-family: var(--font-heading);
      font-size: var(--font-size-title);
      font-weight: 600;
      color: var(--text-primary);
      line-height: 24px;
    }
    
    /* Custom loader node */
    .spinner {
      width: 14px;
      height: 14px;
      color: var(--color-accent);
      animation: rotate 1.2s linear infinite;
      flex-shrink: 0;
    }
    
    @keyframes rotate {
      100% { transform: rotate(360deg); }
    }
    
    /* Meta Row: Subtext & Progress bar container overlayed to prevent layout shifts */
    .status-meta {
      position: relative;
      height: var(--status-meta-height);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
      overflow: hidden;
      transition: height 0.4s ease-in-out, opacity 0.4s ease-in-out;
    }
    
    .subtext {
      font-family: var(--font-body);
      font-size: var(--font-size-body);
      line-height: 20px;
      color: var(--text-quaternary);
      transition: opacity 0.4s ease-in-out;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    
    .progress-bar-container {
      width: 100%;
      height: 4px;
      background-color: var(--border-badge);
      border-radius: 2px;
      overflow: hidden;
      opacity: 0;
      transition: opacity 0.4s ease-in-out;
    }
    
    .progress-bar-fill {
      height: 100%;
      width: 0%;
      background-color: var(--color-accent);
      transition: width 0.1s linear;
    }
    
    /* Bottom Workspace Container: Pure flexbox layout to prevent content overlapping */
    .workspace-section {
      flex: 1;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: flex-start !important; /* Ensure it starts at the top */
      min-height: 0;
      flex-shrink: 0;
    }
    
    /* Changes checklist container (height and opacity transition in sync with terminal) */
    .changes-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: var(--changes-gap);
      flex-shrink: 0;
      height: 0px;
      opacity: 0;
      overflow: hidden;
      transition: height 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                  opacity 0.5s ease-in-out;
    }
    
    .changes-list.active {
      height: auto;
      opacity: 1;
      margin-top: 0 !important;
      margin-bottom: auto !important; /* Pushes button row to the bottom, keeping checklist aligned to the top */
    }
    
    .change-item {
      font-family: var(--font-body);
      font-size: var(--font-size-body);
      line-height: 20px;
      color: var(--text-tertiary);
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    
    /* Simple Neutral Gray Bullet Point */
    .change-bullet {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background-color: var(--text-quaternary);
      flex-shrink: 0;
      margin-top: 7px; /* Align vertically with the center of the 20px first text line */
      transform: scale(0);
      transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    
    .change-bullet.visible {
      transform: scale(1);
    }
    
    /* Terminal Console Window (Immersive cropping: flush bottom, left, right; padded top/left from outer viewport) */
    .terminal {
      background-color: var(--bg-terminal);
      border-top: 1px solid var(--border-badge);
      border-left: 1px solid var(--border-badge);
      /* Cropped: No borders on right and bottom */
      border-right: none;
      border-bottom: none;
      
      border-top-left-radius: 8px;
      border-top-right-radius: 0;
      border-bottom-left-radius: 0;
      border-bottom-right-radius: 0;
      
      display: flex;
      flex-direction: column;
      position: absolute;
      top: 0;
      bottom: 0;
      left: 0;
      right: 0;
      opacity: 1;
      overflow: hidden;
      transition: top 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                  opacity 0.5s ease-in-out,
                  border-color 0.5s,
                  margin-bottom 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      
      /* Negative margins on left, right, and bottom to override padding and touch borders */
      margin-left: calc(-1 * var(--inner-padding));
      margin-right: calc(-1 * var(--inner-padding));
      margin-bottom: calc(-1 * var(--inner-padding));
    }
    
    /* Minimize and fade away in final phase */
    .terminal.minimized {
      top: 100%;
      opacity: 0;
      border-color: transparent;
      margin-left: 0;
      margin-right: 0;
      margin-bottom: 0;
    }
    
    .terminal-header {
      background-color: var(--bg-term-header);
      padding: 6px var(--inner-padding); /* aligns left content padding with inner card padding */
      display: flex;
      align-items: center;
      border-bottom: 1px solid var(--border-inner);
      flex-shrink: 0;
    }
    
    .terminal-title {
      flex: 1;
      text-align: left;
      font-size: 10px;
      color: var(--text-quaternary);
      font-family: var(--font-body);
      font-weight: 500;
    }
    
    .terminal-body {
      padding: 8px var(--inner-padding); /* aligns left content padding with inner card padding */
      font-family: var(--font-mono);
      font-size: var(--font-size-term);
      line-height: 1.5;
      color: var(--text-tertiary);
      overflow-y: auto;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    
    /* Command input lines */
    .term-cmd { color: var(--text-primary); font-weight: 500; }
    .term-cmd::before { content: "$ "; color: var(--color-accent); }
    
    /* Code diff lines styling (Light Mode Theme) */
    .diff-header { color: var(--text-quaternary); font-weight: 500; }
    .diff-del { color: var(--color-red); background-color: var(--color-red-bg); padding: 0 4px; border-radius: 2px; }
    .diff-add { color: var(--color-green); background-color: var(--color-green-bg); padding: 0 4px; border-radius: 2px; }
    
    .type-cursor {
      display: inline-block;
      width: 8px;
      height: 2px;
      background-color: var(--text-quaternary); /* gray cursor */
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 0.8s step-end infinite;
    }
    
    @keyframes blink {
      from, to { background-color: transparent }
      50% { background-color: var(--text-quaternary) }
    }
    
    /* Action Button Row: Swaps in with checklist (Transitions smoothly, no shadows) */
    .button-row {
      display: flex;
      width: 100%;
      height: 0px;
      opacity: 0;
      overflow: hidden;
      pointer-events: none;
      transition: height 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                  opacity 0.5s ease-in-out,
                  margin-top 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      margin-top: 0;
      flex-shrink: 0;
    }
    
    .button-row.visible {
      height: var(--button-height);
      opacity: 1;
      pointer-events: auto;
      margin-top: var(--button-margin-top);
    }
    
    .btn-review {
      background-color: var(--bg-primary);
      border: 1px solid var(--border-button);
      border-radius: 8px;
      padding: 6px 12px;
      font-family: var(--font-body);
      font-size: var(--font-size-body);
      line-height: 20px;
      font-weight: 600;
      color: var(--text-secondary);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease-in-out;
      box-shadow: none; /* No shadow */
    }
    
    .btn-review:hover {
      background-color: var(--bg-secondary);
      border-color: var(--text-quaternary);
      color: var(--text-primary);
    }
    
    /* Fade reset hook */
    .fade-out { opacity: 0 !important; }
  </style>
</head>
<body>

  <div class="outer-card">
    <div class="inner-card" id="inner-card">
      
      <!-- Top Header Section (Static height to stabilize visual elements) -->
      <div class="header-section">
        <!-- Row 1: Agent Badge Header -->
        <div class="badge-row">
          <div class="agent-badge">
            <div class="badge-icon">
              <!-- Inline code brackets icon -->
              <svg width="15" height="13" viewBox="0 0 15 13" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M10.5 9.83344L13.8333 6.50011L10.5 3.16677M3.83333 3.16677L0.5 6.50011L3.83333 9.83344M8.5 0.500107L5.83333 12.5001" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <span class="badge-text">Engineer Agent</span>
          </div>
        </div>
        
        <!-- Row 2: Status Title & Loader -->
        <div class="status-header">
          <span class="status-title" id="status-title">Analyzing Codebase</span>
          <div class="spinner" id="status-loader">
            <!-- Inline loading spinner SVG -->
            <svg width="14" height="15" viewBox="0 0 14 15" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M7 0.5V2.16667M7 11V13.6667M2.83333 7H0.5M13.1667 7H12.1667M11.3047 11.3047L10.8333 10.8333M11.4428 2.61052L10.5 3.55333M2.28105 11.719L4.16667 9.83333M2.41912 2.47245L3.83333 3.88667" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </div>
        
        <!-- Row 3: Status Description & Progress Bar (Always present in DOM layout to prevent shifts) -->
        <div class="status-meta">
          <div class="subtext" id="status-desc">Initializing analysis sequence...</div>
          <div class="progress-bar-container" id="progress-container">
            <div class="progress-bar-fill" id="progress-fill"></div>
          </div>
        </div>
      </div>
      
      <!-- Bottom Workspace Section (Dynamic flex container distributes elements without overlaps) -->
      <div class="workspace-section">
        <!-- Changes list (Staged checklist - Phase 2) -->
        <ul class="changes-list" id="changes-list"></ul>
        
        <!-- Action Trigger Button Row (Phase 2) -->
        <div class="button-row" id="button-row">
          <button class="btn-review">Review Changes</button>
        </div>
        
        <!-- Terminal Code Console (Phase 1) -->
        <div class="terminal" id="terminal-panel">
          <div class="terminal-header">
            <div class="terminal-title">varmeta-agent</div>
          </div>
          <div class="terminal-body" id="term-body"></div>
        </div>
      </div>
      
    </div>
  </div>

  <script>
    const innerCard = document.getElementById('inner-card');
    const statusTitle = document.getElementById('status-title');
    const statusDesc = document.getElementById('status-desc');
    const statusLoader = document.getElementById('status-loader');
    const progressContainer = document.getElementById('progress-container');
    const progressFill = document.getElementById('progress-fill');
    const changesList = document.getElementById('changes-list');
    const termBody = document.getElementById('term-body');
    const buttonRow = document.getElementById('button-row');
    const terminalPanel = document.getElementById('terminal-panel');
    const statusMeta = document.querySelector('.status-meta');
    
    const delay = ms => new Promise(res => setTimeout(res, ms));

    // Terminal Line Printer with typewriter character rendering (Claude-like)
    async function printTermLine(text, className = '', typeSpeed = 4) {
      const line = document.createElement('div');
      if (className) line.className = className;
      termBody.appendChild(line);
      
      if (typeSpeed > 0 && text.length > 0) {
        const cursor = document.createElement('span');
        cursor.className = 'type-cursor';
        line.appendChild(cursor);
        
        for (let i = 0; i < text.length; i++) {
          cursor.insertAdjacentText('beforebegin', text[i]);
          await delay(typeSpeed);
        }
        cursor.remove();
      } else {
        line.textContent = text;
      }
      
      // Auto Scroll Terminal to bottom
      termBody.scrollTop = termBody.scrollHeight;
    }

    // Claude-Style character-by-character typewriter for staged checklists (Green Bullets)
    async function typeChecklistItem(container, textContent, typeSpeed = 8) {
      // 1. Create bullet container (initially scaled to 0)
      const bullet = document.createElement('div');
      bullet.className = 'change-bullet';
      container.appendChild(bullet);
      
      // 2. Pop bullet in
      setTimeout(() => {
        bullet.classList.add('visible');
      }, 50);
      await delay(150);
      
      // 3. Create text element & blinking baseline-stable cursor
      const textSpan = document.createElement('span');
      const cursor = document.createElement('span');
      cursor.className = 'type-cursor';
      container.appendChild(textSpan);
      container.appendChild(cursor);
      
      // 4. Type character-by-character
      for (let i = 0; i < textContent.length; i++) {
        textSpan.textContent += textContent[i];
        await delay(typeSpeed);
      }
      
      // 5. Remove typing cursor
      cursor.remove();
    }

    // Progress Bar animator helper (Controls opacity fade, no display none triggers)
    async function animateProgressBar(durationMs) {
      progressContainer.style.opacity = '1';
      progressFill.style.width = '0%';
      
      const steps = 40;
      const stepDuration = durationMs / steps;
      
      for (let i = 1; i <= steps; i++) {
        progressFill.style.width = `${(i / steps) * 100}%`;
        await delay(stepDuration);
      }
    }

    // Code changes to stage - Focused on single feature fix in detail
    const changes = [
      "Analyzed jwt.strategy.ts for signature validation bypasses",
      "Disabled insecure algorithm 'none' fallback check",
      "Bound signature verification secret to environment keys",
      "Enforced token expiration validation checks",
      "Ran security integration tests (12/12 test cases passed)"
    ];

    // Main Agent Loop lifecycle
    async function runAgentLifecycle() {
      // 1. Initial State Reset (Restoring layouts safely without screen shifts)
      innerCard.classList.remove('fade-out');
      terminalPanel.classList.remove('minimized');
      
      statusTitle.textContent = "Analyzing Codebase";
      statusDesc.textContent = "Initializing security audit...";
      statusDesc.style.opacity = '1';
      statusLoader.style.display = 'block';
      
      progressContainer.style.opacity = '0';
      progressFill.style.width = '0%';
      
      statusMeta.style.height = 'var(--status-meta-height)';
      statusMeta.style.opacity = '1';
      
      changesList.innerHTML = '';
      changesList.classList.remove('active');
      
      termBody.innerHTML = '';
      buttonRow.classList.remove('visible');
      
      await delay(800);
      
      // 2. PHASE 1: Scan & Ingestion (Terminal occupies the bottom workspace)
      statusDesc.textContent = "Scanning authentication modules and strategies...";
      await printTermLine("varmeta-agent audit --path=src/auth/jwt.strategy.ts", "term-cmd", 15);
      await delay(400);
      await printTermLine("[INFO] Parsing AST for JWT validation strategy...", "", 4);
      await delay(150);
      await printTermLine("[INFO] Analyzing imported keys and security parameters...", "", 4);
      await delay(200);
      await printTermLine("[WARN] Line 18: Signature verification key uses weak fallback.", "diff-del", 3);
      await delay(250);
      await printTermLine("[CRIT] Bypass vulnerability: Token validation passes if algorithm is 'none'.", "diff-del", 3);
      await delay(600);
      
      // 3. PHASE 2: Thinking & Refactoring
      statusTitle.textContent = "Refactoring Codebase";
      statusDesc.textContent = "Patching signature bypass vulnerability...";
      
      // Start progress bar and display live file edits
      const progressPromise = animateProgressBar(4500);
      
      await printTermLine("");
      await printTermLine("varmeta-agent fix --path=src/auth/jwt.strategy.ts", "term-cmd", 15);
      await delay(300);
      
      await printTermLine("diff --git a/jwt.strategy.ts b/jwt.strategy.ts", "diff-header", 4);
      await printTermLine("- secretOrKey: 'temp-secret-key-123', ignoreExpiration: true,", "diff-del", 4);
      await printTermLine("+ secretOrKey: process.env.JWT_PUBLIC_KEY, ignoreExpiration: false,", "diff-add", 4);
      await delay(400);
      await printTermLine("- if (jwt.header.alg === 'none') return decodedToken;", "diff-del", 4);
      await printTermLine("+ if (jwt.header.alg === 'none') throw new UnauthorizedException();", "diff-add", 4);
      await delay(500);
      
      await printTermLine("[INFO] Re-running auth suite integration tests...", "", 4);
      await delay(300);
      await printTermLine("[PASS] jwt.strategy.spec.ts -- 12 test cases succeeded.", "diff-add", 4);
      
      await progressPromise; // wait for progress bar to finish
      await delay(400);
      
      // 4. PHASE 3: Answering & Staging
      statusTitle.textContent = "Changes Staged";
      statusDesc.style.opacity = '0'; // fade description out smoothly
      progressContainer.style.opacity = '0'; // fade progress bar out smoothly
      statusLoader.style.display = 'none'; // hide loader node
      
      statusMeta.style.height = '0px';
      statusMeta.style.opacity = '0';
      
      // Minimize terminal and expand checklist container simultaneously
      terminalPanel.classList.add('minimized');
      changesList.classList.add('active');
      await delay(600); // wait for transitions to complete perfectly
      
      // Sequential typewriter printing of staged checklist items
      for (let i = 0; i < changes.length; i++) {
        const li = document.createElement('li');
        li.className = 'change-item';
        changesList.appendChild(li);
        
        // Character typing with baseline-stable bullet point and block cursor
        await typeChecklistItem(li, changes[i], 12);
        
        await delay(350);
      }
      
      // Slide up and fade in the action review button
      buttonRow.classList.add('visible');
      
      // 5. Hold final state before reset loop
      await delay(9000);
      innerCard.classList.add('fade-out');
      await delay(600);
      
      runAgentLifecycle();
    }
    
    // Launch the agent lifecycle simulation
    runAgentLifecycle();
  </script>
