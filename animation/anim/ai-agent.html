<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Agent — Architecture Flow</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html { width:100%; height:100%; background:rgba(255,255,255,0.01); }
    body {
      width:100%; height:100%; overflow:hidden; background:transparent;
      position:relative;
    }
    body::before {
      content: '';
      position: absolute;
      top: 0; left: 0; bottom: 0; width: 15%;
      background: linear-gradient(to right, #fff 0%, rgba(255,255,255,0) 100%);
      pointer-events: none;
      z-index: 10;
    }
    body::after {
      content: '';
      position: absolute;
      top: 0; right: 0; bottom: 0; width: 15%;
      background: linear-gradient(to left, #fff 0%, rgba(255,255,255,0) 100%);
      pointer-events: none;
      z-index: 10;
    }
    canvas { display:block; width:100%; height:100%; background:transparent; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';

const VW = 900, VH = 500;
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const dpr    = window.devicePixelRatio || 1;
let sx = 1, sy = 1;

function resize() {
  canvas.width  = canvas.clientWidth  * dpr;
  canvas.height = canvas.clientHeight * dpr;
  sx = canvas.width  / VW;
  sy = canvas.height / VH;
}
window.addEventListener('resize', resize);
resize();

// Layout: 2 group containers on left (2 nodes each) → center hub → 3 individual right nodes.
// Left nodes (0-3) initiate → center processes → right nodes (4-6) receive response.

const CX = 450, CY = 252;
const CENTER = { x: CX, y: CY, sz: 50, glow: 0, tgt: 0.3, hover: 0 };

const NODES = [
  { x: 140, y: 112, sz: 40, glow: 0, tgt: 0, hover: 0 }, // 0
  { x: 140, y: 198, sz: 40, glow: 0, tgt: 0, hover: 0 }, // 1
  { x: 140, y: 313, sz: 40, glow: 0, tgt: 0, hover: 0 }, // 2
  { x: 140, y: 399, sz: 40, glow: 0, tgt: 0, hover: 0 }, // 3
  { x: 755, y: 112, sz: 40, glow: 0, tgt: 0, hover: 0 }, // 4
  { x: 755, y: 252, sz: 40, glow: 0, tgt: 0, hover: 0 }, // 5
  { x: 755, y: 392, sz: 40, glow: 0, tgt: 0, hover: 0 }, // 6
];

// ── Mouse tracking (logical VW×VH space) ──────────────────────────
let hoverX = -9999, hoverY = -9999;
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  hoverX = (e.clientX - r.left) / r.width  * VW;
  hoverY = (e.clientY - r.top)  / r.height * VH;
});
canvas.addEventListener('mouseleave', () => { hoverX = -9999; hoverY = -9999; });

// Claude braille spinner — advances fast while DIGESTING, slow otherwise
const SPINNER_FRAMES = ['⠋','⠙','⠹','⠸','⠼','⠴','⠦','⠧','⠇','⠏'];
let spinnerFrame = 0;
let spinnerLastTs = 0;

// Shared phase for hover pulse rings (all nodes share one advancing offset)
let hoverPulseOffset = 0;

// Group containers — drawn as backgrounds behind left nodes
const GROUPS = [
  { x: 72, y:  55, w: 136, h: 195, nodes: [0, 1] },
  { x: 72, y: 260, w: 136, h: 195, nodes: [2, 3] },
];

function revPath(p) { return { p0: p.p3, p1: p.p2, p2: p.p1, p3: p.p0 }; }

// Pointy-top hexagon path (vertex at top, clockwise)
function hexPath(x, y, r) {
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const a = Math.PI / 2 + (Math.PI / 3) * i;
    const px = x + r * Math.cos(a), py = y + r * Math.sin(a);
    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  }
  ctx.closePath();
}

// Custom smooth bezier paths — left nodes use S-curves into center;
// right nodes stored as right→center so revPath(PATHS[i]) gives center→right C-curves.
const PATHS = [
  { p0:[140,112], p1:[320,112], p2:[382,252], p3:[450,252] }, // 0 → center
  { p0:[140,198], p1:[308,198], p2:[388,252], p3:[450,252] }, // 1 → center
  { p0:[140,313], p1:[308,313], p2:[388,252], p3:[450,252] }, // 2 → center
  { p0:[140,399], p1:[320,399], p2:[382,252], p3:[450,252] }, // 3 → center
  { p0:[755,112], p1:[578,112], p2:[517,252], p3:[450,252] }, // center → 4 (reversed)
  { p0:[755,252], p1:[630,252], p2:[510,252], p3:[450,252] }, // center → 5 (reversed)
  { p0:[755,392], p1:[578,392], p2:[517,252], p3:[450,252] }, // center → 6 (reversed)
];

// ── Flow particle ──────────────────────────────────────────────────
// ── SYNC SPEED ── ~2.9 s to traverse canvas at 60 fps
// blockchain: SCROLL_PPS = 48 px/s, surge screen speed ≈ 70 px/s
// data-flow:  PSPEED = 0.006/frame (slightly faster)
const PSPEED = 0.025;

class Flow {
  constructor(ni, dir) {
    this.ni   = ni;
    this.dir  = dir;   // 1 = node→center (incoming), -1 = center→node (outgoing)
    this.t    = 0;
    this.s    = PSPEED * (0.85 + Math.random() * 0.30);
    this.done = false;
    this.col  = '16,120,243';  // unified travel color across all animations
    this.lw   = 3.2;
    this.path = dir === 1 ? PATHS[ni] : revPath(PATHS[ni]);
  }
  tick(dt) {
    this.t += this.s * (dt / 16.67);
    if (this.t >= 1.15) this.done = true;
  }
  alpha() {
    const t = this.t;
    if (t < 0.07) return t / 0.07;
    if (t > 0.85) return Math.max(0, (1 - t) / 0.15);
    return 1;
  }
}

// ── Conversation state machine ─────────────────────────────────────
// Each conversation owns one path exclusively:
//   INCOMING → node glows, flow travels node→master
//   DIGESTING → master pulses, brief pause (master "thinks")
//   OUTGOING → master→node, destination node glows on arrival
// No two flows ever share the same path simultaneously.

const DIGEST_MS  = 520;   // master think time
const COOLDOWN_MS = 2000;  // before same node can be picked again
const MAX_CONVOS  = 2;

const busyPaths   = new Set();
const nodeCooldown = new Array(NODES.length).fill(0);
let conversations  = [];
let lastSpawnTs    = -999;

class Conversation {
  constructor(ni) {
    this.ni    = ni;
    this.state = 'INCOMING';
    this.flow  = new Flow(ni, 1);
    this.timer = 0;
    busyPaths.add(ni);
  }

  update(ts, dt) {
    if (this.state === 'INCOMING') {
      this.flow.tick(dt);
      if (this.flow.done) {
        this.state = 'DIGESTING';
        this.timer = ts;
        this.flow  = null;
      }
    } else if (this.state === 'DIGESTING') {
      if (ts - this.timer >= DIGEST_MS) {
        this.state = 'OUTGOING';
        this.flow  = new Flow(this.ni, -1);
      }
    } else if (this.state === 'OUTGOING') {
      this.flow.tick(dt);
      if (this.flow.done) {
        busyPaths.delete(this.ni);
        nodeCooldown[this.ni] = ts + COOLDOWN_MS;
        return true; // done
      }
    }
    return false;
  }
}

function trySpawn(ts) {
  if (conversations.length >= MAX_CONVOS) return;
  if (ts - lastSpawnTs < 350 + Math.random() * 600) return;
  const free = NODES
    .map((_, i) => i)
    .filter(i => !busyPaths.has(i) && ts >= nodeCooldown[i]);
  if (free.length === 0) return;
  const ni = free[Math.floor(Math.random() * free.length)];
  conversations.push(new Conversation(ni));
  lastSpawnTs = ts;
}

// ── Glow targets from active conversations ─────────────────────────
function computeGlowTargets() {
  NODES.forEach(n => { n.tgt = 0; });
  CENTER.tgt = 0.28;

  conversations.forEach(c => {
    const ni = c.ni;
    if (c.state === 'INCOMING' && c.flow) {
      const a = c.flow.alpha(), t = Math.min(c.flow.t, 1);
      NODES[ni].tgt = Math.max(NODES[ni].tgt, a * Math.max(0, 1 - t / 0.55));
      CENTER.tgt    = Math.max(CENTER.tgt, 0.28 + a * Math.max(0, (t - 0.55) / 0.45) * 0.72);
    } else if (c.state === 'DIGESTING') {
      CENTER.tgt = Math.max(CENTER.tgt, 0.95);
    } else if (c.state === 'OUTGOING' && c.flow) {
      const a = c.flow.alpha(), t = Math.min(c.flow.t, 1);
      CENTER.tgt    = Math.max(CENTER.tgt, 0.28 + a * Math.max(0, 1 - t / 0.55) * 0.55);
      NODES[ni].tgt = Math.max(NODES[ni].tgt, a * Math.max(0, (t - 0.55) / 0.45));
    }
  });
}

// ── Draw base arc ──────────────────────────────────────────────────
function drawBaseArc(path) {
  const x0 = path.p0[0]*sx, y0 = path.p0[1]*sy;
  const x1 = path.p3[0]*sx, y1 = path.p3[1]*sy;
  const g = ctx.createLinearGradient(x0, y0, x1, y1);
  g.addColorStop(0,    'rgba(142,213,255,0)');
  g.addColorStop(0.08, 'rgba(142,213,255,0.35)');
  g.addColorStop(0.92, 'rgba(142,213,255,0.35)');
  g.addColorStop(1,    'rgba(142,213,255,0)');
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(x0, y0);
  ctx.bezierCurveTo(path.p1[0]*sx, path.p1[1]*sy,
                    path.p2[0]*sx, path.p2[1]*sy, x1, y1);
  ctx.strokeStyle = g;
  ctx.lineWidth   = 1.2 * Math.min(sx, sy);
  ctx.lineCap     = 'round';
  ctx.stroke();
  ctx.restore();
}

// ── Draw traveling glow — data-flow gradient window style ──────────
function drawFlowGlow(flow) {
  const path = flow.path;
  const t    = flow.t;
  const a    = flow.alpha();
  if (a <= 0) return;

  const x0 = path.p0[0]*sx, y0 = path.p0[1]*sy;
  const x1 = path.p3[0]*sx, y1 = path.p3[1]*sy;
  const start   = Math.max(0, t - 0.20);
  const end     = Math.min(1, t + 0.20);
  const opacity = (0.92 * a).toFixed(3);
  const col     = flow.col;

  const grad = ctx.createLinearGradient(x0, y0, x1, y1);
  grad.addColorStop(0, `rgba(${col},0)`);
  if (start > 0.001) grad.addColorStop(start, `rgba(${col},0)`);
  grad.addColorStop(Math.min(t, 1), `rgba(${col},${opacity})`);
  if (end < 0.999)   grad.addColorStop(end, `rgba(${col},0)`);
  grad.addColorStop(1, `rgba(${col},0)`);

  ctx.save();
  ctx.beginPath();
  ctx.moveTo(x0, y0);
  ctx.bezierCurveTo(path.p1[0]*sx, path.p1[1]*sy,
                    path.p2[0]*sx, path.p2[1]*sy, x1, y1);
  ctx.strokeStyle = grad;
  ctx.lineWidth   = flow.lw * Math.min(sx, sy);
  ctx.lineCap     = 'round';
  ctx.stroke();
  ctx.restore();
}

// Design DNA: all node color transitions use continuous lerp — no threshold jumps.
function lerpRGBA(r0,g0,b0,a0, r1,g1,b1,a1, t) {
  return `rgba(${(r0+(r1-r0)*t+.5)|0},${(g0+(g1-g0)*t+.5)|0},${(b0+(b1-b0)*t+.5)|0},${(a0+(a1-a0)*t).toFixed(2)})`;
}

// ── Draw node — translate to node center, scale for hover ─────────
function drawNode(n, isCenter) {
  const x  = n.x * sx, y = n.y * sy;
  const sz = n.sz * Math.min(sx, sy);
  const sc = Math.min(sx, sy);
  const cr = sz * 0.25;
  const gl = Math.max(0, n.glow);
  const hv = n.hover || 0;

  ctx.save();
  ctx.translate(x, y);
  if (hv > 0.001) ctx.scale(1 + 0.08 * hv, 1 + 0.08 * hv);

  // ── Hover pulse rings (drawn first so node sits on top) ──
  if (hv > 0.001) {
    const baseR = isCenter ? sz * 1.15 : sz;
    for (let i = 0; i < 2; i++) {
      const raw = (hoverPulseOffset + i * 0.5) % 1;
      const pr = baseR * (1.15 + raw * 2.0);
      const pa = (1 - raw) * 0.11 * hv;
      ctx.beginPath();
      ctx.arc(0, 0, pr, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(16,120,243,${pa.toFixed(3)})`;
      ctx.lineWidth = 1.3 * sc;
      ctx.stroke();
    }
  }

  // Three-stop blend: idle -> hover -> surge
  // gl = active flow (surge), hv = hover
  const u2 = gl;
  const u1 = hv * (1 - gl);
  const u0 = 1 - u1 - u2;

  function b3(r0,g0,b0,a0, r1,g1,b1,a1, r2,g2,b2,a2) {
    return `rgba(${(r0*u0+r1*u1+r2*u2+.5)|0},${(g0*u0+g1*u1+g2*u2+.5)|0},${(b0*u0+b1*u1+b2*u2+.5)|0},${(a0*u0+a1*u1+a2*u2).toFixed(2)})`;
  }

  // base: idle (255,255,255), hover (238,248,255), surge (230,244,255)
  const fillCol = b3(255,255,255,1.00, 238,248,255,1.00, 230,244,255,0.90);
  const ic      = b3(16,120,243,0.85,  16,120,243,1.00,  16,120,243,1.00);

  const brdStart = b3(16,120,243,0.70,  16,120,243,0.95,  89,188,255,0.90);
  const brdEnd   = b3(16,120,243,0.70,  16,120,243,0.95,  16,120,243,0.95);
  const rngStart = b3(16,120,243,0.60,  16,120,243,0.90,  89,188,255,0.75);
  const rngEnd   = b3(16,120,243,0.60,  16,120,243,0.90,  16,120,243,0.90);

  if (isCenter) {
    // ── Hexagon outer shell ──
    const hr = sz * 1.15;
    hexPath(0, 0, hr);
    ctx.fillStyle = fillCol; ctx.fill();
    {
      const brd = ctx.createLinearGradient(0, -hr, 0, hr);
      brd.addColorStop(0, brdStart);
      brd.addColorStop(1, brdEnd);
      ctx.strokeStyle = brd;
    }
    ctx.lineWidth = 1.8 * sc; ctx.stroke();

    // ── Hexagon inner ring ──
    const ihr = sz * 0.62;
    hexPath(0, 0, ihr);
    {
      const rng = ctx.createLinearGradient(0, -ihr, 0, ihr);
      rng.addColorStop(0, rngStart);
      rng.addColorStop(1, rngEnd);
      ctx.strokeStyle = rng;
    }
    ctx.lineWidth = 1.0 * sc; ctx.stroke();

    // ── Claude braille spinner ──
    const fontSize = Math.round(sz * 0.78);
    ctx.font = `${fontSize}px monospace`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = ic;
    ctx.fillText(SPINNER_FRAMES[spinnerFrame], 0, sz * 0.04);

  } else {
    // ── Regular rounded-square node ──
    ctx.beginPath();
    ctx.roundRect(-sz, -sz, sz * 2, sz * 2, cr);
    ctx.fillStyle = fillCol; ctx.fill();
    {
      const brd = ctx.createLinearGradient(0, -sz, 0, sz);
      brd.addColorStop(0, brdStart);
      brd.addColorStop(1, brdEnd);
      ctx.strokeStyle = brd;
    }
    ctx.lineWidth = 1.2 * sc; ctx.stroke();

    const ir = sz * 0.55;
    ctx.beginPath();
    ctx.roundRect(-ir, -ir, ir * 2, ir * 2, ir * 0.18);
    {
      const rng = ctx.createLinearGradient(0, -ir, 0, ir);
      rng.addColorStop(0, rngStart);
      rng.addColorStop(1, rngEnd);
      ctx.strokeStyle = rng;
    }
    ctx.lineWidth = 1.0 * sc; ctx.stroke();

    const dr = sz * 0.22;
    ctx.beginPath();
    ctx.rect(-dr, -dr, dr * 2, dr * 2);
    ctx.fillStyle = ic; ctx.fill();
  }

  ctx.restore();
}

// ── Pulse ring around master ───────────────────────────────────────
let pulseOffset = 0;

function drawPulse(glow) {
  const x = CX*sx, y = CY*sy;
  const sz = CENTER.sz * Math.min(sx, sy);
  for (let i = 0; i < 2; i++) {
    const raw = (pulseOffset + i*0.5) % 1;
    const r   = sz * (1.35 + raw*2.8);
    const a   = (1-raw) * 0.13 * (0.35 + glow*0.65);
    ctx.save();
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(16,120,243,${a})`;
    ctx.lineWidth   = 1.4 * Math.min(sx, sy);
    ctx.stroke();
    ctx.restore();
  }
}

// ── Main loop ──────────────────────────────────────────────────────
let prevTs = null;

function frame(ts) {
  const dt = prevTs ? Math.min(ts-prevTs, 50) : 16;
  prevTs = ts;

  pulseOffset      = (pulseOffset      + dt * 0.00028) % 1;
  hoverPulseOffset = (hoverPulseOffset + dt * 0.00032) % 1;

  // Update per-node hover lerp — asymmetric: fast rise (200ms), slow fall (600ms)
  const kHoverRise = 1 - Math.pow(0.003, dt / 1000);
  const kHoverFall = 1 - Math.pow(0.030, dt / 1000);
  const allNodes = [CENTER, ...NODES];
  allNodes.forEach((n, idx) => {
    const dx = hoverX - n.x, dy = hoverY - n.y;
    let tgt = Math.sqrt(dx*dx + dy*dy) < n.sz * 1.6 ? 1 : 0;

    // Pulse node like hovered during data flow traversal
    if (idx === 0) {
      const flowActive = conversations.some(c => {
        if (c.state === 'DIGESTING') return true;
        if (c.state === 'INCOMING' && c.flow && c.flow.t > 0.80) return true;
        if (c.state === 'OUTGOING' && c.flow && c.flow.t < 0.20) return true;
        return false;
      });
      if (flowActive) tgt = 1;
    } else {
      const ni = idx - 1;
      const flowActive = conversations.some(c => {
        if (c.ni !== ni) return false;
        if (c.state === 'INCOMING' && c.flow && c.flow.t < 0.20) return true;
        if (c.state === 'OUTGOING' && c.flow && c.flow.t > 0.80) return true;
        return false;
      });
      if (flowActive) tgt = 1;
    }

    n.hover += (tgt - n.hover) * (tgt > n.hover ? kHoverRise : kHoverFall);
  });

  // Spinner advances faster while master is actively thinking
  const isDigesting = conversations.some(c => c.state === 'DIGESTING');
  const spinInterval = isDigesting ? 75 : 180;
  if (ts - spinnerLastTs >= spinInterval) {
    spinnerFrame = (spinnerFrame + 1) % SPINNER_FRAMES.length;
    spinnerLastTs = ts;
  }

  trySpawn(ts);
  conversations = conversations.filter(c => !c.update(ts, dt));

  computeGlowTargets();
  const k = 1 - Math.pow(0.018, dt/1000);
  NODES.forEach(n => { n.glow += (n.tgt-n.glow)*k; });
  CENTER.glow += (CENTER.tgt-CENTER.glow)*k;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Subtle dot grid background with radial alpha mask and scale to 0 (using colorsGray300 = 215,215,215)
  const gridSpacing = 36;
  const cx = VW / 2, cy = VH / 2;
  const maxDist = 800;
  for (let x = gridSpacing / 2; x < VW; x += gridSpacing) {
    for (let y = gridSpacing / 2; y < VH; y += gridSpacing) {
      const dx = x - cx;
      const dy = y - cy;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > maxDist) continue;
      const f = 1 - dist / maxDist;
      const ease = f;
      let r = 2.25 * f * Math.min(sx, sy);
      if (r < 0.1) continue;

      // Hover proximity scaling: scale up near cursor
      const dmx = x - hoverX;
      const dmy = y - hoverY;
      const mouseDist = Math.sqrt(dmx * dmx + dmy * dmy);
      let dotOpacity = ease * 0.9;
      if (mouseDist < 130) {
        const u = 1 - mouseDist / 130;
        r *= (1 + 1.8 * u);
        dotOpacity = Math.min(1.0, dotOpacity * (1 + 0.5 * u));
      }

      ctx.fillStyle = `rgba(215,215,215,${dotOpacity.toFixed(3)})`;
      ctx.beginPath();
      ctx.arc(Math.round(x * sx), Math.round(y * sy), Math.round(r * 2) / 2, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  PATHS.forEach(p => drawBaseArc(p));
  drawPulse(CENTER.glow);
  conversations.forEach(c => { if (c.flow) drawFlowGlow(c.flow); });
  NODES.forEach(n => drawNode(n, false));
  drawNode(CENTER, true);

  requestAnimationFrame(frame);
}

// Seed one conversation immediately
conversations.push(new Conversation(Math.floor(Math.random() * NODES.length)));
lastSpawnTs = 0;
requestAnimationFrame(frame);
</script>
</body>
</html>
