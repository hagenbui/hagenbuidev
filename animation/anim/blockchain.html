<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Varmeta Blockchain Ledger</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
    html { width: 100%; height: 100%; background: #fff; }
    body {
      width: 100%; height: 100%; overflow: hidden;
      background: transparent;
      position: relative;
    }
    body::before {
      content: '';
      position: absolute;
      top: 0; left: 0; bottom: 0; width: 15%;
      background: linear-gradient(to right, #fff 0%, rgba(255,255,255,0) 100%);
      pointer-events: none;
      z-index: 10;
    }
    body::after {
      content: '';
      position: absolute;
      top: 0; right: 0; bottom: 0; width: 15%;
      background: linear-gradient(to left, #fff 0%, rgba(255,255,255,0) 100%);
      pointer-events: none;
      z-index: 10;
    }
    canvas { display: block; width: 100%; height: 100%; }
  </style>
</head>
<body>
<canvas id="c"></canvas>

<script>
'use strict';

// ── DESIGN DNA (see anim/DESIGN_DNA.md) ──────────────────────────────
// Travel color: #1078f3 (16,120,243)
// Hover rise τ≈200ms → kRise = 1 - pow(0.003, dt_s)
// Hover fall τ≈600ms → kFall = 1 - pow(0.030, dt_s)
// Hover scale: 1 + 0.08*hv; pulse rings: α=(1-raw)*0.11*hv, scale=1.15+raw*2.0
// Node blend: u2=gl (surge), u1=hv*(1-gl) (hover), u0=1-u1-u2 (idle)
// Edge glow: ±0.20 gradient window, feather 0–7% / 85–100%, width 3.2
// No threshold color jumps — all transitions use continuous lerp.

function lerpRGBA(r0,g0,b0,a0, r1,g1,b1,a1, t) {
  return `rgba(${(r0+(r1-r0)*t+.5)|0},${(g0+(g1-g0)*t+.5)|0},${(b0+(b1-b0)*t+.5)|0},${(a0+(a1-a0)*t).toFixed(2)})`;
}

// ── Canvas setup ─────────────────────────────────────────────────────
const VW = 675, VH = 323;
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const dpr    = window.devicePixelRatio || 1;
let sx = 1, sy = 1;

function resize() {
  canvas.width  = canvas.clientWidth  * dpr;
  canvas.height = canvas.clientHeight * dpr;
  sx = canvas.width  / VW;
  sy = canvas.height / VH;
}
window.addEventListener('resize', resize);
resize();

// ── Layout ────────────────────────────────────────────────────────────
const PAT = [
  { id: 0, rx:   0, ry: 161 },
  { id: 1, rx: 153, ry:  71 },
  { id: 2, rx: 171, ry: 251 },
  { id: 3, rx: 324, ry:  71 },
  { id: 4, rx: 400, ry: 161 },
  { id: 5, rx: 495, ry: 251 },
  { id: 6, rx: 513, ry:  71 },
  { id: 7, rx: 666, ry: 161 },
];
const TW  = 801;   // tile width (logical px, wider than VW for seamless loop)
const NT  = 3;     // number of tiles

// ── SYNC SPEED ── surge screen speed ≈ SCROLL_PPS + 460 ≈ 540 px/s visible
const SCROLL_PPS = 80;

let nodes = [];
for (let t = 0; t < NT; t++) {
  PAT.forEach(p => {
    nodes.push({
      tile: t, id: p.id,
      cx: p.rx + t * TW, cy: p.ry,
      checked: false,
      checkLerp: 0,   // 0 = unchecked, 1 = checked (smoothly lerped)
      hover: 0, hoverTgt: 0,
    });
  });
}

// ── Edge definitions ─────────────────────────────────────────────────
const edgeDefs = [
  { from: 0, to: 1 },
  { from: 0, to: 2 },
  { from: 1, to: 3 },
  { from: 2, to: 4 },
  { from: 3, to: 4 },
  { from: 4, to: 5 },
  { from: 4, to: 6 },
  { from: 5, to: 7 },
  { from: 6, to: 7 },
  { from: 7, to: 0, isCrossTile: true },
];

let edges = [];
for (let t = 0; t < NT; t++) {
  const nextT = (t + 1) % NT;
  edgeDefs.forEach(d => {
    edges.push({
      from: [t, d.from],
      to: [d.isCrossTile ? nextT : t, d.to],
      isCrossTile: !!d.isCrossTile,
      fromNode: null, toNode: null,
      arcLen: 0,
      surge: { active: false, progressPx: 0, speed: 0 }
    });
  });
}

// ── Bezier helpers ────────────────────────────────────────────────────
function getBezierCoords(e) {
  const a = e.fromNode, b = e.toNode;
  let bx = b.cx;
  if (bx < a.cx) bx += NT * TW;
  const dx = bx - a.cx;
  return {
    x1: a.cx,              y1: a.cy,
    cx1: a.cx + dx * 0.45, cy1: a.cy,
    cx2: bx  - dx * 0.45, cy2: b.cy,
    x2: bx,               y2: b.cy,
    isHoriz: Math.abs(a.cy - b.cy) < 2
  };
}

function computeArcLen(e) {
  const { x1, y1, cx1, cy1, cx2, cy2, x2, y2, isHoriz } = getBezierCoords(e);
  if (isHoriz) return Math.abs(x2 - x1);
  let len = 0, px = x1, py = y1;
  for (let i = 1; i <= 60; i++) {
    const t = i / 60, mt = 1 - t;
    const x = mt*mt*mt*x1 + 3*mt*mt*t*cx1 + 3*mt*t*t*cx2 + t*t*t*x2;
    const y = mt*mt*mt*y1 + 3*mt*mt*t*cy1 + 3*mt*t*t*cy2 + t*t*t*y2;
    len += Math.sqrt((x - px) ** 2 + (y - py) ** 2);
    px = x; py = y;
  }
  return len;
}

// ── Link edges and compute initial arc lengths ────────────────────────
edges.forEach((e, idx) => {
  e.fromNode = nodes.find(n => n.tile === e.from[0] && n.id === e.from[1]);
  e.toNode   = nodes.find(n => n.tile === e.to[0]   && n.id === e.to[1]);
  e.arcLen   = computeArcLen(e);
  e.surge.speed = SCROLL_PPS + 460 + (Math.sin(idx * 1.7) + 1) * 12;
});

// ── Initialize checked state and in-progress surges ───────────────────
nodes.forEach(n => {
  if (n.cx <= VW / 2) { n.checked = true; n.checkLerp = 1; }
});
edges.forEach(e => {
  let bx = e.toNode.cx;
  if (bx < e.fromNode.cx) bx += NT * TW;
  if (e.fromNode.cx <= VW / 2 && bx > VW / 2) {
    e.surge.active = true;
    e.surge.progressPx = ((VW / 2 - e.fromNode.cx) / (bx - e.fromNode.cx)) * e.arcLen;
  }
});

// ── Mouse tracking (logical VW×VH space) ─────────────────────────────
let mx = -9999, my = -9999;
function updateMouse(clientX, clientY) {
  const r = canvas.getBoundingClientRect();
  mx = (clientX - r.left) / r.width  * VW;
  my = (clientY - r.top)  / r.height * VH;
}
canvas.addEventListener('mousemove',   e => updateMouse(e.clientX, e.clientY));
canvas.addEventListener('pointermove', e => updateMouse(e.clientX, e.clientY));
canvas.addEventListener('mouseleave',  () => { mx = -9999; my = -9999; });
canvas.addEventListener('pointerleave',() => { mx = -9999; my = -9999; });

// ── Pre-compute dot grid positions (full tiled width, seamless loop) ──
const gridPositions = [];
{
  const spacing = TW / 22;
  for (let x = spacing / 2; x < NT * TW; x += spacing) {
    for (let y = spacing / 2; y < VH; y += spacing) {
      gridPositions.push({ x, y });
    }
  }
}

// ── Node geometry constants ───────────────────────────────────────────
const SZ = 44, H = SZ / 2;   // outer box half-size
const IR = 11;                 // inner ring half-size
const ID = 5;                  // dot half-size

// ── Draw dot grid ─────────────────────────────────────────────────────
function drawGrid(off) {
  const scx = VW / 2, scy = VH / 2;
  const maxDist = 600;
  const mxWorld = mx + off;

  gridPositions.forEach(c => {
    const screenX = c.x - off;
    if (screenX < -40 || screenX > VW + 40) return;

    const sdx = screenX - scx, sdy = c.y - scy;
    const f = Math.max(0, 1 - Math.sqrt(sdx * sdx + sdy * sdy) / maxDist);
    if (f < 0.01) return;

    let r = 2.25 * (VW / 900) * f;   // normalize to 900-wide reference space
    let opacity = f * 0.9;

    const dx = c.x - mxWorld, dy = c.y - my;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 130) {
      const u = 1 - dist / 130;
      r       *= (1 + 1.8 * u);
      opacity  = Math.min(1.0, opacity * (1 + 0.5 * u));
    }

    ctx.fillStyle = `rgba(142,213,255,${opacity.toFixed(3)})`;
    ctx.beginPath();
    ctx.arc(
      Math.round(screenX * sx),
      Math.round(c.y * sy),
      Math.round(r * Math.min(sx, sy) * 2) / 2,
      0, Math.PI * 2
    );
    ctx.fill();
  });
}

// ── Draw base edge (neutral gray gradient) ────────────────────────────
function drawBaseEdge(e, off) {
  const { x1, y1, cx1, cy1, cx2, cy2, x2, y2, isHoriz } = getBezierCoords(e);
  const ox = -off;
  const bx1 = (x1 + ox) * sx, by1 = y1 * sy;
  const bcx1 = (cx1 + ox) * sx, bcy1 = cy1 * sy;
  const bcx2 = (cx2 + ox) * sx, bcy2 = cy2 * sy;
  const bx2 = (x2 + ox) * sx,  by2 = y2 * sy;

  const grad = ctx.createLinearGradient(bx1, by1, bx2, by2);
  grad.addColorStop(0,    'rgba(142,213,255,0)');
  grad.addColorStop(0.08, 'rgba(142,213,255,0.35)');
  grad.addColorStop(0.92, 'rgba(142,213,255,0.35)');
  grad.addColorStop(1,    'rgba(142,213,255,0)');

  ctx.save();
  ctx.beginPath();
  ctx.moveTo(bx1, by1);
  if (isHoriz) ctx.lineTo(bx2, by2);
  else         ctx.bezierCurveTo(bcx1, bcy1, bcx2, bcy2, bx2, by2);
  ctx.strokeStyle = grad;
  ctx.lineWidth   = 1.2 * Math.min(sx, sy);
  ctx.lineCap     = 'round';
  ctx.stroke();
  ctx.restore();
}

// ── Draw surge glow (gradient window traveling along bezier) ──────────
function drawSurgeGlow(e, off) {
  const t = e.surge.progressPx / e.arcLen;
  if (t <= 0) return;

  let edgeFade = 1;
  if (t < 0.07) edgeFade = t / 0.07;
  else if (t > 0.85) edgeFade = Math.max(0, (1 - t) / 0.15);

  const opacity  = 0.92 * edgeFade;
  const tClamp   = Math.min(t, 1);
  const start    = Math.max(0, tClamp - 0.20);
  const end      = Math.min(1, tClamp + 0.20);

  const { x1, y1, cx1, cy1, cx2, cy2, x2, y2, isHoriz } = getBezierCoords(e);
  const ox = -off;
  const bx1 = (x1 + ox) * sx, by1 = y1 * sy;
  const bcx1 = (cx1 + ox) * sx, bcy1 = cy1 * sy;
  const bcx2 = (cx2 + ox) * sx, bcy2 = cy2 * sy;
  const bx2 = (x2 + ox) * sx,  by2 = y2 * sy;

  const grad = ctx.createLinearGradient(bx1, by1, bx2, by2);
  grad.addColorStop(0, 'rgba(16,120,243,0)');
  if (start > 0.001) grad.addColorStop(start, 'rgba(16,120,243,0)');
  grad.addColorStop(tClamp, `rgba(16,120,243,${opacity.toFixed(3)})`);
  if (end < 0.999)   grad.addColorStop(end,   'rgba(16,120,243,0)');
  grad.addColorStop(1, 'rgba(16,120,243,0)');

  ctx.save();
  ctx.beginPath();
  ctx.moveTo(bx1, by1);
  if (isHoriz) ctx.lineTo(bx2, by2);
  else         ctx.bezierCurveTo(bcx1, bcy1, bcx2, bcy2, bx2, by2);
  ctx.strokeStyle = grad;
  ctx.lineWidth   = 3.2 * Math.min(sx, sy);
  ctx.lineCap     = 'round';
  ctx.stroke();
  ctx.restore();
}

// ── Draw node ─────────────────────────────────────────────────────────
// Blockchain-specific states: unchecked (white/blue) → checked (blue/white rotated 45°)
// checkLerp drives the transition continuously — no threshold jump.
function drawNode(n, off, hoverPulseOffset) {
  const screenX = n.cx - off;
  const x = screenX * sx, y = n.cy * sy;
  const sc = Math.min(sx, sy);
  const hv = n.hover;
  const cl = n.checkLerp;

  ctx.save();
  ctx.translate(x, y);
  if (hv > 0.001) ctx.scale(1 + 0.08 * hv, 1 + 0.08 * hv);

  // Hover pulse rings
  if (hv > 0.001) {
    for (let i = 0; i < 2; i++) {
      const raw = (hoverPulseOffset + i * 0.5) % 1;
      const pr  = H * sc * (1.15 + raw * 2.0);
      const pa  = (1 - raw) * 0.11 * hv;
      ctx.beginPath();
      ctx.arc(0, 0, pr, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(16,120,243,${pa.toFixed(3)})`;
      ctx.lineWidth = 1.2 * sc;
      ctx.stroke();
    }
  }

  const hSc  = H  * sc;
  const irSc = IR * sc;
  const idSc = ID * sc;

  // Color interpolation — all continuous, no if/else color switches
  // Outer fill: white (idle) / #eef8ff (hover) → #1078f3 (checked)
  const baseFill = hv > 0.001 ? [238, 248, 255] : [255, 255, 255];
  const outerFill   = lerpRGBA(baseFill[0], baseFill[1], baseFill[2], 1, 16, 120, 243, 1, cl);
  const ringStroke  = lerpRGBA(16, 120, 243, 1, 255, 255, 255, 1, cl);
  const dotFill     = lerpRGBA(16, 120, 243, 1, 255, 255, 255, 1, cl);
  const rot         = cl * Math.PI / 4;   // 0 → 45deg

  // Outer rounded rect
  ctx.beginPath();
  ctx.roundRect(-hSc, -hSc, hSc * 2, hSc * 2, 5 * sc);
  ctx.fillStyle   = outerFill;
  ctx.fill();
  ctx.strokeStyle = 'rgba(16,120,243,1)';
  ctx.lineWidth   = 1.2 * sc;
  ctx.stroke();

  // Inner ring + dot (both rotate together on check)
  ctx.save();
  ctx.rotate(rot);

  ctx.beginPath();
  ctx.roundRect(-irSc, -irSc, irSc * 2, irSc * 2, 2 * sc);
  ctx.strokeStyle = ringStroke;
  ctx.lineWidth   = 1.0 * sc;
  ctx.stroke();

  ctx.beginPath();
  ctx.roundRect(-idSc, -idSc, idSc * 2, idSc * 2, 1 * sc);
  ctx.fillStyle = dotFill;
  ctx.fill();

  ctx.restore();
  ctx.restore();
}

// ── Background ellipse glow ───────────────────────────────────────
function drawBgGlow() {
  const cx = (VW / 2) * sx;
  const cy = (VH / 2) * sy;
  const rx = VW * 0.75 * sx;
  const ry = VH * 0.50 * sy;

  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(rx, ry);

  const g = ctx.createRadialGradient(0, 0, 0, 0, 0, 1);
  g.addColorStop(0,    'rgba(89,188,255,0.10)');
  g.addColorStop(0.40, 'rgba(142,213,255,0.07)');
  g.addColorStop(0.72, 'rgba(188,229,255,0.025)');
  g.addColorStop(1,    'rgba(188,229,255,0)');

  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(0, 0, 1, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

// ── Animation loop ─────────────────────────────────────────────────────
let hoverPulseOffset = 0;
let off = 0;
let lastTs = null;

function animate(ts) {
  if (!lastTs) lastTs = ts;
  const dt = Math.min((ts - lastTs) / 1000, 0.05);
  lastTs = ts;

  // 1. Scroll
  off += SCROLL_PPS * dt;

  if (off >= TW) {
    off -= TW;
    nodes.forEach(n => { n.cx -= TW; });
    nodes.forEach(n => {
      if (n.cx < 0) {
        n.cx       += NT * TW;
        n.checked   = false;
        n.checkLerp = 0;
        edges.forEach(e => {
          if (e.fromNode === n || e.toNode === n) {
            e.surge.active = false;
            e.surge.progressPx = 0;
          }
        });
      }
    });
    edges.forEach(e => { e.arcLen = computeArcLen(e); });
  }

  // 2. Trigger surges when destination node enters left half of viewport
  edges.forEach(e => {
    if (e.fromNode.checked && !e.toNode.checked && !e.surge.active) {
      if (e.toNode.cx - off <= VW / 2) {
        e.surge.active = true;
        e.surge.progressPx = 0;
      }
    }
  });

  // 3. Advance surges
  edges.forEach(e => {
    if (e.surge.active) {
      e.surge.progressPx += e.surge.speed * dt;
      if (e.surge.progressPx > e.arcLen) e.surge.progressPx = e.arcLen;
    }
  });

  // 4. Consensus: check node only when ALL incoming surges have arrived
  nodes.forEach(n => {
    if (!n.checked) {
      const incoming = edges.filter(e => e.toNode === n);
      if (incoming.length > 0 && incoming.every(e => e.surge.active && e.surge.progressPx >= e.arcLen)) {
        n.checked = true;
        incoming.forEach(e => { e.surge.active = false; e.surge.progressPx = 0; });
      }
    }
  });

  // 5. Update hover and checkLerp
  hoverPulseOffset = (hoverPulseOffset + dt * 0.32) % 1;
  const kHoverRise = 1 - Math.pow(0.003, dt);
  const kHoverFall = 1 - Math.pow(0.030, dt);
  const kCheck     = 1 - Math.pow(0.005, dt);

  nodes.forEach(n => {
    // Mouse proximity
    const dx = (n.cx - off) - mx, dy = n.cy - my;
    let tgt = Math.sqrt(dx * dx + dy * dy) < H * 1.6 ? 1 : 0;

    // Pulse node like hovered when a surge is near either endpoint
    const surgeClose = edges.some(e => {
      if (!e.surge.active) return false;
      if (e.fromNode === n) return (e.surge.progressPx / e.arcLen) < 0.20;
      if (e.toNode   === n) return (e.surge.progressPx / e.arcLen) > 0.80;
      return false;
    });
    if (surgeClose) tgt = 1;

    n.hover += (tgt - n.hover) * (tgt > n.hover ? kHoverRise : kHoverFall);

    const clTgt = n.checked ? 1 : 0;
    n.checkLerp += (clTgt - n.checkLerp) * kCheck;
  });

  // 6. Draw
  if (canvas.width !== canvas.clientWidth * dpr || canvas.height !== canvas.clientHeight * dpr) resize();
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  // drawBgGlow();

  drawGrid(off);

  edges.forEach(e => drawBaseEdge(e, off));
  edges.forEach(e => { if (e.surge.active) drawSurgeGlow(e, off); });

  nodes.forEach(n => {
    const screenX = n.cx - off;
    if (screenX < -(H + 10) || screenX > VW + H + 10) return;
    drawNode(n, off, hoverPulseOffset);
  });

  requestAnimationFrame(animate);
}

requestAnimationFrame(animate);
</script>
</body>
</html>
