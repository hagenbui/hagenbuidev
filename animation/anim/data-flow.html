<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Data — Arc Animation</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html {
      width: 100%;
      height: 100%;
      background-color: rgba(255, 255, 255, 0.01); /* Workaround for Chromium iframe blending/transparency bug */
    }
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      position: relative;
    }
    body::before {
      content: '';
      position: absolute;
      top: 0; left: 0; bottom: 0; width: 15%;
      background: linear-gradient(to right, #fff 0%, rgba(255,255,255,0) 100%);
      pointer-events: none;
      z-index: 10;
    }
    body::after {
      content: '';
      position: absolute;
      top: 0; right: 0; bottom: 0; width: 15%;
      background: linear-gradient(to left, #fff 0%, rgba(255,255,255,0) 100%);
      pointer-events: none;
      z-index: 10;
    }
    canvas { display:block; width:100%; height:100%; background: transparent; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';

// ── Coordinate space matches Figma frame 40011678:18924 (946 × 736) ──
const VW = 946, VH = 500;

// Viewport pan: shift the camera so arcs enter at center-left (~1/3 from top)
// rather than near the very top. VIEW_OFFSET_Y is subtracted from world-y
// when converting screen → world for mouse, and added back at render time.
// VH_VIS is the visible bottom in world space.
const VIEW_OFFSET_Y = 0;
const VH_VIS = VH - VIEW_OFFSET_Y; // = 500

// Single cubic bezier per arc — smooth throughout, no kink.
// P0 = entry (left edge), P1 = long horizontal ctrl, P2 = convergence zone, P3 = exit (lower-right)
const N_ARCS    = 6;
const ENTRY_Y0  =  90;   // top arc entry (48px padding + 42px node half-size)
const ENTRY_Y1  =  410;   // bottom arc entry (48px padding + 42px node half-size)
const P1X       =  420;   // ctrl-1 x — long horizontal start before bending
const PINCH_X   =  620;   // convergence x ≈ 66% canvas width
const PINCH_YC  =  250;   // convergence center y (centered)
const PINCH_SPR =   20;   // y-gap between arcs at convergence (widened for 6 arcs)
const EXIT_X    =  920;   // exit near right edge
const EXIT_YC   =  250;   // exit center (centered)
const EXIT_SPR  =   62;   // y-gap at exit (widened for 6 arcs)

// ── Arc sampling resolution ───────────────────────────────────────
const N = 52;

// ── Build rest positions ──────────────────────────────────────────
function mkNode(x, y){ return {x, y, vx:0, vy:0, rx:x, ry:y}; }

const arcs = Array.from({length: N_ARCS}, (_, ai) => {
  const frac   = ai / (N_ARCS - 1);
  const entryY = ENTRY_Y0 + frac * (ENTRY_Y1 - ENTRY_Y0);
  const offset = ai - (N_ARCS - 1) / 2;
  const pinchY = PINCH_YC + offset * PINCH_SPR;
  const exitY  = EXIT_YC  + offset * EXIT_SPR;

  // Cubic bezier: P0=(0,entryY) P1=(P1X,entryY) P2=(PINCH_X,pinchY) P3=(EXIT_X,exitY)
  // P0→P1 horizontal = long flat start; P2 tight = convergence; P3 lower-right = medium exit
  return Array.from({length: N}, (_, k) => {
    const t = k / (N - 1), mt = 1 - t;
    return mkNode(
      mt*mt*mt*0      + 3*mt*mt*t*P1X    + 3*mt*t*t*PINCH_X + t*t*t*EXIT_X,
      mt*mt*mt*entryY + 3*mt*mt*t*entryY + 3*mt*t*t*pinchY  + t*t*t*exitY
    );
  });
});

// ── Canvas ────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const dpr    = window.devicePixelRatio || 1;
let   sx = 1, sy = 1;   // scale: logical → canvas pixels

function resize(){
  canvas.width  = canvas.clientWidth  * dpr;
  canvas.height = canvas.clientHeight * dpr;
  sx = canvas.width  / VW;
  sy = canvas.height / VH;
}
window.addEventListener('resize', resize);
resize();

// ── Mouse (for hover-triggered data pulses only) ──────────────────
let mx = -9999, my = -9999;
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mx = (e.clientX - r.left) * dpr / sx;
  my = (e.clientY - r.top)  * dpr / sy - VIEW_OFFSET_Y;
});
canvas.addEventListener('mouseleave', () => { mx = -9999; my = -9999; });


// ── Background ellipse glow ───────────────────────────────────────
// Quaternary radial gradient centered on the arc convergence zone.
// Four stops: tertiary → secondary → light → transparent.
// Drawn once per frame behind everything else.
function drawBgGlow() {
  const cx = (VW / 2) * sx;
  const cy = (VH / 2) * sy;
  const rx = VW * 0.75 * sx;   // wider — spans most of canvas
  const ry = VH * 0.50 * sy;   // exactly fits height, no clipping

  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(rx, ry);

  const g = ctx.createRadialGradient(0, 0, 0, 0, 0, 1);
  g.addColorStop(0,    'rgba(89,188,255,0.10)');   // #59bcff — subtle center
  g.addColorStop(0.40, 'rgba(142,213,255,0.07)');  // #8ed5ff — broader spread
  g.addColorStop(0.72, 'rgba(188,229,255,0.025)'); // #bce5ff — gentle tail
  g.addColorStop(1,    'rgba(188,229,255,0)');      // transparent at edge

  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(0, 0, 1, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

// ── Render ────────────────────────────────────────────────────────
// arcIdx 0..N_ARCS-1 — middle arcs get higher opacity (bell curve)
function renderArc(nodes, arcIdx){
  const x0   = nodes[0].x * sx,              y0 = nodes[0].y * sy;
  const x1   = nodes[nodes.length-1].x * sx, y1 = nodes[nodes.length-1].y * sy;

  const mid  = (N_ARCS - 1) / 2;
  const dist = Math.abs(arcIdx - mid) / mid;
  const prom = 1 - dist * dist;

  const col  = '142,213,255';
  const peak = (0.26 + prom * 0.16).toFixed(2);

  const grad = ctx.createLinearGradient(x0, y0, x1, y1);
  grad.addColorStop(0,    `rgba(${col},0)`);
  grad.addColorStop(0.07, `rgba(${col},${peak})`);
  grad.addColorStop(0.85, `rgba(${col},${peak})`);
  grad.addColorStop(1,    `rgba(${col},0)`);

  ctx.save();
  ctx.strokeStyle = grad;
  ctx.lineWidth   = 2.2 * Math.min(sx, sy);
  ctx.lineCap     = 'round';
  ctx.beginPath();
  ctx.moveTo(x0, y0);
  for(let i = 1; i < nodes.length - 1; i++){
    const mx2 = (nodes[i].x + nodes[i+1].x) / 2 * sx;
    const my2 = (nodes[i].y + nodes[i+1].y) / 2 * sy;
    ctx.quadraticCurveTo(nodes[i].x * sx, nodes[i].y * sy, mx2, my2);
  }
  ctx.lineTo(x1, y1);
  ctx.stroke();
  ctx.restore();
}

// Draw a moving gradient highlight along the active flow path
function drawFlow(nodes, t, arcIdx){
  const x0   = nodes[0].x * sx,              y0 = nodes[0].y * sy;
  const x1   = nodes[nodes.length-1].x * sx, y1 = nodes[nodes.length-1].y * sy;

  const mid  = (N_ARCS - 1) / 2;
  const dist = Math.abs(arcIdx - mid) / mid;
  const prom = 1 - dist * dist;

  const col = '16,120,243';  // unified travel color: #1078f3
  const start = Math.max(0, t - 0.20);
  const peak  = Math.max(0, Math.min(1, t));
  const end   = Math.min(1, t + 0.20);

  // Apply edge feather mask (fades out active flow as it nears left/right bounds)
  let edgeFade = 1;
  if (t < 0.07) {
    edgeFade = Math.max(0, t / 0.07);
  } else if (t > 0.85) {
    edgeFade = Math.max(0, (1.0 - t) / 0.15);
  }

  const opacity = 0.92 * edgeFade;

  const grad = ctx.createLinearGradient(x0, y0, x1, y1);
  grad.addColorStop(0, `rgba(${col},0)`);
  if (start > 0) grad.addColorStop(start, `rgba(${col},0)`);
  grad.addColorStop(peak, `rgba(${col},${opacity})`);
  if (end < 1) grad.addColorStop(end, `rgba(${col},0)`);
  grad.addColorStop(1, `rgba(${col},0)`);

  ctx.save();
  ctx.strokeStyle = grad;
  ctx.lineWidth   = 2.2 * Math.min(sx, sy);   // synced to default base line thickness (2.2)
  ctx.lineCap     = 'round';
  ctx.beginPath();
  ctx.moveTo(x0, y0);
  for(let i = 1; i < nodes.length - 1; i++){
    const mx2 = (nodes[i].x + nodes[i+1].x) / 2 * sx;
    const my2 = (nodes[i].y + nodes[i+1].y) / 2 * sy;
    ctx.quadraticCurveTo(nodes[i].x * sx, nodes[i].y * sy, mx2, my2);
  }
  ctx.lineTo(x1, y1);
  ctx.stroke();
  ctx.restore();
}

// ── SYNC SPEED ── ~2.8 s to traverse canvas at 60 fps
// blockchain: SCROLL_PPS = 48 px/s, surge screen speed ≈ 70 px/s
// ai-agent:   PSPEED = 0.0058/frame (slightly slower)
const PSPEED = 0.0095;
let parts = [];

// ── Wire nodes on strings ─────────────────────────────────────────
// 6 arcs spread evenly top→bottom, 1 node each near midpoint (staggered organic depths)
const WIRE_NODES = [
  { arc: 0, t: 0.22 },
  { arc: 1, t: 0.55 },
  { arc: 2, t: 0.33 },
  { arc: 3, t: 0.66 },
  { arc: 4, t: 0.44 },
  { arc: 5, t: 0.77 },
];
WIRE_NODES.forEach(wn => {
  wn.glow = 0;
  wn.hover = 0;
});

let hoverPulseOffset = 0;

function getPosOnArc(ai, t) {
  const nodes = arcs[ai];
  const f = Math.max(0, Math.min(N - 2, t * (N - 1)));
  const i = Math.floor(f);
  const r = f - i;
  return {
    x: nodes[i].x * (1 - r) + nodes[i + 1].x * r,
    y: nodes[i].y * (1 - r) + nodes[i + 1].y * r
  };
}

// Design DNA: all node color transitions use continuous lerp — no threshold jumps.
function lerpRGBA(r0,g0,b0,a0, r1,g1,b1,a1, t) {
  return `rgba(${(r0+(r1-r0)*t+.5)|0},${(g0+(g1-g0)*t+.5)|0},${(b0+(b1-b0)*t+.5)|0},${(a0+(a1-a0)*t).toFixed(2)})`;
}

function drawWireNode(wx, wy, gl, hv) {
  const x  = wx * sx;
  const y  = wy * sy;
  const sc = Math.min(sx, sy);
  const HSZ = 32 * sc;
  const CR  = 5.5 * sc;
  const IR  = 16 * sc;
  const CRI = 2.5 * sc;
  const DR  = 7.0 * sc;

  // Three-stop blend: gray → secondary blue (hover) → primary blue (surge)
  // Surge contribution dims hover so they don't double-stack
  const u2 = gl;                   // primary blue from surge
  const u1 = hv * (1 - gl);       // secondary blue from hover (dims when surge active)
  const u0 = 1 - u1 - u2;

  function b3(r0,g0,b0,a0, r1,g1,b1,a1, r2,g2,b2,a2) {
    return `rgba(${(r0*u0+r1*u1+r2*u2+.5)|0},${(g0*u0+g1*u1+g2*u2+.5)|0},${(b0*u0+b1*u1+b2*u2+.5)|0},${(a0*u0+a1*u1+a2*u2).toFixed(2)})`;
  }

  const fillCol = b3(255,255,255,1.00, 238,248,255,1.00, 238,248,255,1.00);
  const brdCol  = b3(16,120,243,0.70, 16,120,243,1.00,  16,120,243,1.00);
  const ringCol = b3(16,120,243,0.60, 16,120,243,1.00,  89,188,255,0.90);
  const dotCol  = b3(16,120,243,0.80, 16,120,243,1.00,  16,120,243,1.00);

  ctx.save();
  ctx.translate(x, y);
  if (hv > 0.001) ctx.scale(1 + 0.08 * hv, 1 + 0.08 * hv);

  // Hover pulse rings (drawn behind node)
  if (hv > 0.001) {
    for (let i = 0; i < 2; i++) {
      const raw = (hoverPulseOffset + i * 0.5) % 1;
      const pr = HSZ * (1.15 + raw * 2.0);
      const pa = (1 - raw) * 0.11 * hv;
      ctx.beginPath();
      ctx.arc(0, 0, pr, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(16,120,243,${pa.toFixed(3)})`;
      ctx.lineWidth = 1.3 * sc;
      ctx.stroke();
    }
  }

  ctx.beginPath();
  ctx.roundRect(-HSZ, -HSZ, HSZ * 2, HSZ * 2, CR);
  ctx.fillStyle   = fillCol;
  ctx.fill();
  ctx.strokeStyle = brdCol;
  ctx.lineWidth   = 1.2 * sc;
  ctx.stroke();

  ctx.beginPath();
  ctx.roundRect(-IR, -IR, IR * 2, IR * 2, CRI);
  ctx.strokeStyle = ringCol;
  ctx.lineWidth   = 1.0 * sc;
  ctx.stroke();

  ctx.beginPath();
  ctx.rect(-DR, -DR, DR * 2, DR * 2);
  ctx.fillStyle = dotCol;
  ctx.fill();

  ctx.restore();
}

class P {
  constructor(ai, t=0, dir=1){ 
    this.ai=ai; 
    this.t=t; 
    this.dir=dir; 
    this.s=PSPEED*(0.8+Math.random()*0.4); 
    this.dead=false; 
  }
  pos(){
    const n=arcs[this.ai], f=Math.max(0, Math.min(N-2, this.t*(N-1))), i=Math.min(0|f,N-2), r=f-i;
    return {x:n[i].x*(1-r)+n[i+1].x*r, y:n[i].y*(1-r)+n[i+1].y*r};
  }
  tick(dt){ 
    this.t += this.s * this.dir * (dt / 16.67); 
    if(this.dir === 1 && this.t >= 1.2) this.dead = true;
    if(this.dir === -1 && this.t <= -0.2) this.dead = true;
  }
}

// Seed 3 arcs at staggered positions
[0, 2, 4].forEach((ai, idx) => parts.push(new P(ai, 0.10 + idx * 0.18, 1)));
let lastSpawn = 0;
let prevTs = 0;

function frame(ts){
  if (canvas.width !== canvas.clientWidth * dpr || canvas.height !== canvas.clientHeight * dpr) {
    resize();
  }
  const dt = prevTs > 0 ? Math.min(ts - prevTs, 50) : 16;
  prevTs = ts;

  hoverPulseOffset = (hoverPulseOffset + dt * 0.00032) % 1;

  parts.forEach(p => p.tick(dt));
  parts = parts.filter(p => !p.dead);
  
  // Maintain 2-3 active flows across 6 arcs
  if(parts.length < 3){
    if(ts - lastSpawn > 400 + Math.random() * 800){ // min spacing to keep it looking paced
      const activeArcs = new Set(parts.map(p => p.ai));
      const availableArcs = Array.from({length: N_ARCS}, (_, i) => i).filter(i => !activeArcs.has(i));
      const nextArc = availableArcs.length > 0
        ? availableArcs[Math.floor(Math.random() * availableArcs.length)]
        : Math.floor(Math.random() * N_ARCS);
      
      parts.push(new P(nextArc, 0, 1)); // Start at left, move right
      lastSpawn = ts;
    }
  }

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  // drawBgGlow();

  // Subtle dot grid background with radial alpha mask and scale to 0 (using colorsGray300 = 215,215,215)
  const gridSpacing = 36;
  const cx = VW / 2, cy = VH / 2;
  const maxDist = 800;
  for (let x = gridSpacing / 2; x < VW; x += gridSpacing) {
    for (let y = gridSpacing / 2; y < VH; y += gridSpacing) {
      const dx = x - cx;
      const dy = y - cy;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > maxDist) continue;
      const f = 1 - dist / maxDist;
      const ease = f;
      let r = 2.25 * f * Math.min(sx, sy);
      if (r < 0.1) continue;

      // Hover proximity scaling: scale up near cursor
      const dmx = x - mx;
      const dmy = y - my;
      const mouseDist = Math.sqrt(dmx * dmx + dmy * dmy);
      let dotOpacity = ease * 0.9;
      if (mouseDist < 130) {
        const u = 1 - mouseDist / 130;
        r *= (1 + 1.8 * u);
        dotOpacity = Math.min(1.0, dotOpacity * (1 + 0.5 * u));
      }

      ctx.fillStyle = `rgba(142,213,255,${dotOpacity.toFixed(3)})`;
      ctx.beginPath();
      ctx.arc(Math.round(x * sx), Math.round(y * sy), Math.round(r * 2) / 2, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Shift all rendering down by VIEW_OFFSET_Y logical units
  // so arcs appear to enter from center-left instead of near the top.
  ctx.save();
  ctx.translate(0, VIEW_OFFSET_Y * sy);

  // 1. Draw base neutral arcs
  arcs.forEach((a, i) => renderArc(a, i));

  // 2. Draw moving gradient highlight flows
  for(const p of parts){
    drawFlow(arcs[p.ai], p.t, p.ai);
  }

  // 3. Update wire node glow and hover — asymmetric easing (fast rise, slow fall)
  const kRise      = 1 - Math.pow(0.003, dt / 1000);
  const kFall      = 1 - Math.pow(0.030, dt / 1000);
  const kHoverRise = 1 - Math.pow(0.003, dt / 1000);
  const kHoverFall = 1 - Math.pow(0.030, dt / 1000);
  for (const wn of WIRE_NODES) {
    // glow from data surge proximity
    let tgt = 0;
    for (const p of parts) {
      if (p.ai === wn.arc) {
        const d = Math.abs(p.t - wn.t);
        if (d < 0.12) tgt = Math.max(tgt, 1 - d / 0.12);
      }
    }
    wn.glow += (tgt - wn.glow) * (tgt > wn.glow ? kRise : kFall);

    // hover from mouse proximity OR data flow proximity
    const pos = getPosOnArc(wn.arc, wn.t);
    const dx = mx - pos.x, dy = my - pos.y;
    let htgt = Math.sqrt(dx*dx + dy*dy) < 55 ? 1 : 0;

    // Pulse node like hovered during data flow traversal
    const flowClose = parts.some(p => p.ai === wn.arc && Math.abs(p.t - wn.t) < 0.12);
    if (flowClose) htgt = 1;

    wn.hover += (htgt - wn.hover) * (htgt > wn.hover ? kHoverRise : kHoverFall);
  }

  // 4. Draw wire nodes on top of arcs
  for (const wn of WIRE_NODES) {
    const pos = getPosOnArc(wn.arc, wn.t);
    drawWireNode(pos.x, pos.y, wn.glow, wn.hover);
  }

  ctx.restore(); // end viewport pan

  requestAnimationFrame(frame);
}
requestAnimationFrame(ts => { lastSpawn = ts; frame(ts); });
</script>
</body>
</html>
