<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>About — Hero</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; background:#fff; }
    canvas { display:block; width:100%; height:100%; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';

// ── Canvas ────────────────────────────────────────────────────────────
const VW = 1200, VH = 560;
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const dpr    = window.devicePixelRatio || 1;
let sx = 1, sy = 1;

function resize() {
  canvas.width  = canvas.clientWidth  * dpr;
  canvas.height = canvas.clientHeight * dpr;
  sx = canvas.width  / VW;
  sy = canvas.height / VH;
}
window.addEventListener('resize', resize);
resize();

// ── Focal point (bottom-center, just below frame) ─────────────────────
const OX = VW / 2;
const OY = VH + 48;

// ── Seeded RNG for stable layout ──────────────────────────────────────
let seed = 20250101;
function rnd() { seed = (seed * 1664525 + 1013904223) >>> 0; return seed / 4294967296; }

// ── Build lines ───────────────────────────────────────────────────────
// angle convention: 0 = right, π/2 = up (screen up = -y), π = left
// endpoint: ex = OX + cos(angle)*len,  ey = OY - sin(angle)*len
const N          = 96;
const ANGLE_MIN  = 0.13;                    // ≈7.5° from horizontal
const ANGLE_MAX  = Math.PI - 0.13;

const lines = [];
for (let i = 0; i < N; i++) {
  const frac  = i / (N - 1);
  const angle = ANGLE_MIN + frac * (ANGLE_MAX - ANGLE_MIN);

  // Longer toward centre (sin peaks at π/2 = straight up)
  const baseLen = 200 + Math.sin(angle) * 300;
  const length  = baseLen * (0.45 + rnd() * 0.70);

  lines.push({
    angle,
    length,
    t:        -(rnd() * 4),          // staggered pre-delay (negative = waiting)
    speed:    260 + rnd() * 140,     // logical px / s
    dotGlow:  0,                     // 0–1 glow at tip
  });
}

// ── Background radial gradient ────────────────────────────────────────
function drawBg() {
  const cx = (VW / 2) * sx;
  const cy = VH * sy;
  const r  = VH * 1.35 * Math.min(sx, sy);

  const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
  g.addColorStop(0.00, 'rgba(188, 221, 255, 0.60)');
  g.addColorStop(0.30, 'rgba(210, 233, 255, 0.38)');
  g.addColorStop(0.60, 'rgba(228, 242, 255, 0.18)');
  g.addColorStop(1.00, 'rgba(255, 255, 255, 0.00)');

  ctx.fillStyle = g;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

// ── Draw one line + comet + tip dot ──────────────────────────────────
function drawLine(l) {
  const ex = OX + Math.cos(l.angle) * l.length;
  const ey = OY - Math.sin(l.angle) * l.length;

  const ox = OX * sx, oy = OY * sy;
  const x1 = ex  * sx, y1 = ey  * sy;

  // Base line — faint
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(ox, oy);
  ctx.lineTo(x1, y1);
  ctx.strokeStyle = 'rgba(16,120,243,0.11)';
  ctx.lineWidth   = 0.75;
  ctx.stroke();
  ctx.restore();

  // Traveling comet spark
  const t = l.t;
  if (t > 0 && t < 1.20) {
    const tHead = Math.min(1, t);
    const tTail = Math.max(0, t - 0.32);

    const hx = (OX + Math.cos(l.angle) * l.length * tHead) * sx;
    const hy = (OY - Math.sin(l.angle) * l.length * tHead) * sy;
    const tx = (OX + Math.cos(l.angle) * l.length * tTail) * sx;
    const ty = (OY - Math.sin(l.angle) * l.length * tTail) * sy;

    let ef = 1;
    if (t < 0.10) ef = t / 0.10;

    const g = ctx.createLinearGradient(tx, ty, hx, hy);
    g.addColorStop(0,    'rgba(16,120,243,0)');
    g.addColorStop(0.55, `rgba(16,120,243,${(0.30 * ef).toFixed(3)})`);
    g.addColorStop(1,    `rgba(142,213,255,${(0.82 * ef).toFixed(3)})`);

    ctx.save();
    ctx.beginPath();
    ctx.moveTo(tx, ty);
    ctx.lineTo(hx, hy);
    ctx.strokeStyle = g;
    ctx.lineWidth   = 1.6;
    ctx.lineCap     = 'round';
    ctx.stroke();
    ctx.restore();
  }

  // Tip dot — always dim, glows when spark arrives
  const dg  = l.dotGlow;
  const dot = Math.min(sx, sy);
  ctx.save();
  ctx.beginPath();
  ctx.arc(x1, y1, (1.5 + dg * 2.8) * dot, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(16,120,243,${(0.18 + dg * 0.68).toFixed(3)})`;
  ctx.fill();
  ctx.restore();
}

// ── Render loop ───────────────────────────────────────────────────────
const kRise = dt => 1 - Math.pow(0.002, dt);
const kFall = dt => 1 - Math.pow(0.018, dt);

let lastTs = 0;
function frame(ts) {
  const dt = Math.min((ts - lastTs) / 1000, 0.05);
  lastTs = ts;

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawBg();

  lines.forEach(l => {
    l.t += (l.speed / l.length) * dt;

    if (l.t > 1.50) {
      l.t     = -(0.3 + rnd() * 3.5);
      l.speed = 260 + rnd() * 140;
    }

    const glowTgt = (l.t > 0.82 && l.t < 1.20) ? 1 : 0;
    l.dotGlow += (glowTgt - l.dotGlow) * (glowTgt > l.dotGlow ? kRise(dt) : kFall(dt));

    drawLine(l);
  });

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
