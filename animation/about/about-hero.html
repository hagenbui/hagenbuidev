<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>About — Hero</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; background:#fff; }
    canvas { display:block; width:100%; height:100%; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';

// ── Canvas ────────────────────────────────────────────────────────────
const VW = 1200, VH = 560;
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const dpr    = window.devicePixelRatio || 1;
let sx = 1, sy = 1;

function resize() {
  canvas.width  = canvas.clientWidth  * dpr;
  canvas.height = canvas.clientHeight * dpr;
  sx = canvas.width  / VW;
  sy = canvas.height / VH;
}
window.addEventListener('resize', resize);
resize();

// ── Burst origin: bottom-right corner ────────────────────────────────
const FOCAL_SX = VW;
const FOCAL_SY = VH;
const CAM_Z    = 1400;   // perspective focal length

function project(x, y, z) {
  const w = CAM_Z / (CAM_Z + z);
  return { lx: x * w + FOCAL_SX, ly: -y * w + FOCAL_SY };
}

// ── Seeded RNG ────────────────────────────────────────────────────────
let seed = 83421;
function rnd() { seed = (seed * 1664525 + 1013904223) >>> 0; return seed / 4294967296; }

// ── Build strings ─────────────────────────────────────────────────────
// In world coords (y-up):
//   angle = π/2  →  dx=0, dy=1  → tip at top-right  (right edge)
//   angle = 3π/4 →  dx=-0.707, dy=0.707  → diagonal upper-left
//   angle = π    →  dx=-1, dy=0  → tip at bottom-left  (bottom edge)
// Strings fan across this quarter-circle, all pointing into the canvas.
const N         = 240;
const ANGLE_MIN = Math.PI * 0.50;   // up  (right edge)
const ANGLE_MAX = Math.PI * 1.00;   // left (bottom edge)
const Z_SPREAD  = 0.44;             // depth variation  →  3-D sphere feel

const strings = [];
for (let i = 0; i < N; i++) {
  const frac    = i / (N - 1);
  const jitter  = (rnd() - 0.5) * 0.055;   // per-string angular jitter → fuzziness
  const angle2d = ANGLE_MIN + frac * (ANGLE_MAX - ANGLE_MIN) + jitter;

  // 2-D base direction + random z offset
  let dx = Math.cos(angle2d);
  let dy = Math.sin(angle2d);
  let dz = (rnd() * 2 - 1) * Z_SPREAD;

  // Normalise so all strings are unit direction vectors
  const mag = Math.sqrt(dx*dx + dy*dy + dz*dz);
  dx /= mag; dy /= mag; dz /= mag;

  strings.push({
    dx, dy, dz,
    length:   280 + rnd() * 390,   // 280 – 670 logical px  (ragged tips = fuzzy look)
    t:        -(rnd() * 6.0),      // large stagger so load-in is gradual
    speed:    75 + rnd() * 55,     // 75–130 logical px / s  (slow)
    dotGlow:  0,
    deflX: 0, deflY: 0,
  });
}

// Depth sort once (no rotation → order never changes)
strings.sort((a, b) => b.dz - a.dz);   // back (high dz) drawn first

// ── Cursor repulsion ──────────────────────────────────────────────────
const REPEL_R   = 155;   // influence radius (logical px)
const REPEL_MAX = 95;    // max tip deflection (logical px)

let mx = -9999, my = -9999;
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mx = (e.clientX - r.left) / r.width  * VW;
  my = (e.clientY - r.top)  / r.height * VH;
});
canvas.addEventListener('mouseleave', () => { mx = -9999; my = -9999; });

// ── Background gradient ───────────────────────────────────────────────
function drawBg() {
  const r = Math.max(VW, VH) * 1.15 * Math.min(sx, sy);
  const g = ctx.createRadialGradient(FOCAL_SX*sx, FOCAL_SY*sy, 0,
                                      FOCAL_SX*sx, FOCAL_SY*sy, r);
  g.addColorStop(0.00, 'rgba(188,221,255,0.65)');
  g.addColorStop(0.30, 'rgba(210,233,255,0.34)');
  g.addColorStop(0.60, 'rgba(228,242,255,0.13)');
  g.addColorStop(1.00, 'rgba(255,255,255,0.00)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

// ── Render loop ───────────────────────────────────────────────────────
let lastTs = 0;

function frame(ts) {
  const dt = Math.min((ts - lastTs) / 1000, 0.05);
  lastTs = ts;

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawBg();

  const kRise = 1 - Math.pow(0.002, dt);
  const kFall = 1 - Math.pow(0.018, dt);

  strings.forEach(s => {
    // Advance spark
    s.t += (s.speed / s.length) * dt;
    if (s.t > 1.55) {
      s.t    = -(0.3 + rnd() * 5.0);
      s.speed = 75 + rnd() * 55;
    }

    // Projected tip (logical coords)
    const tip = project(s.dx * s.length, s.dy * s.length, s.dz * s.length);

    // Cursor repulsion: smooth spring deflection
    const ddx   = tip.lx - mx;
    const ddy   = tip.ly - my;
    const dist2 = ddx * ddx + ddy * ddy;
    let tgtDX = 0, tgtDY = 0;
    if (dist2 < REPEL_R * REPEL_R && dist2 > 0.01) {
      const dist = Math.sqrt(dist2);
      const push = Math.pow(1 - dist / REPEL_R, 2) * REPEL_MAX;
      tgtDX = (ddx / dist) * push;
      tgtDY = (ddy / dist) * push;
    }
    const kD = dist2 < REPEL_R * REPEL_R
      ? 1 - Math.pow(0.004, dt)   // fast rise   τ ≈ 60 ms
      : 1 - Math.pow(0.030, dt);  // slow return τ ≈ 600 ms
    s.deflX += (tgtDX - s.deflX) * kD;
    s.deflY += (tgtDY - s.deflY) * kD;

    const tlx = tip.lx + s.deflX;
    const tly = tip.ly + s.deflY;

    // Depth: dz ∈ [-1,1]; dz<0 = toward viewer (front), dz>0 = away (back)
    const depth     = (s.dz + 1) * 0.5;    // 0 = front, 1 = back
    const baseAlpha = 0.22 - depth * 0.16;  // 0.22 → 0.06
    const lineW     = 0.90 - depth * 0.50;  // 0.90 → 0.40

    // ── Base string ────────────────────────────────────────────────
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(FOCAL_SX * sx, FOCAL_SY * sy);
    ctx.lineTo(tlx * sx, tly * sy);
    ctx.strokeStyle = `rgba(16,120,243,${Math.max(0.03, baseAlpha).toFixed(3)})`;
    ctx.lineWidth   = Math.max(0.25, lineW);
    ctx.stroke();
    ctx.restore();

    // ── Traveling spark ────────────────────────────────────────────
    const t = s.t;
    if (t > 0 && t < 1.22) {
      const tHead = Math.min(1, t);
      const tTail = Math.max(0, t - 0.30);

      // Blend spark toward deflected tip as it approaches t=1
      const blend    = Math.max(0, (tHead - 0.78) / 0.22);
      const tailBl   = tHead > 0.01 ? blend * (tTail / tHead) : 0;

      const hRaw = project(s.dx*s.length*tHead, s.dy*s.length*tHead, s.dz*s.length*tHead);
      const tRaw = project(s.dx*s.length*tTail, s.dy*s.length*tTail, s.dz*s.length*tTail);

      const hLx = hRaw.lx + s.deflX * blend;
      const hLy = hRaw.ly + s.deflY * blend;
      const tLx = tRaw.lx + s.deflX * tailBl;
      const tLy = tRaw.ly + s.deflY * tailBl;

      const ef = t < 0.08 ? t / 0.08 : 1;
      const sa = (1 - depth * 0.55) * ef;

      const g = ctx.createLinearGradient(tLx*sx, tLy*sy, hLx*sx, hLy*sy);
      g.addColorStop(0,    'rgba(16,120,243,0)');
      g.addColorStop(0.55, `rgba(16,120,243,${(0.28 * sa).toFixed(3)})`);
      g.addColorStop(1,    `rgba(142,213,255,${(0.85 * sa).toFixed(3)})`);

      ctx.save();
      ctx.beginPath();
      ctx.moveTo(tLx*sx, tLy*sy);
      ctx.lineTo(hLx*sx, hLy*sy);
      ctx.strokeStyle = g;
      ctx.lineWidth   = (1.6 - depth * 0.4) * Math.min(sx, sy);
      ctx.lineCap     = 'round';
      ctx.stroke();
      ctx.restore();
    }

    // ── Tip dot with glow ──────────────────────────────────────────
    const glowTgt = (s.t > 0.85 && s.t < 1.22) ? 1 : 0;
    s.dotGlow += (glowTgt - s.dotGlow) * (glowTgt > s.dotGlow ? kRise : kFall);
    const dg   = s.dotGlow;
    const dotR = (1.1 + dg * 2.4) * (1 - depth * 0.42) * Math.min(sx, sy);

    if (dotR > 0.15) {
      ctx.save();
      ctx.beginPath();
      ctx.arc(tlx * sx, tly * sy, dotR, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(16,120,243,${Math.min(1, baseAlpha + dg * 0.58).toFixed(3)})`;
      ctx.fill();
      ctx.restore();
    }
  });

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
