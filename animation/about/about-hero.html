<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>About — Hero Strings</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html {
      width: 100%; height: 100%;
      background-color: rgba(255,255,255,0.01); /* Chromium iframe transparency workaround */
    }
    body {
      width: 100%; height: 100%;
      overflow: hidden; background: transparent; position: relative;
    }
    canvas { display: block; width: 100%; height: 100%; background: transparent; }
    /* Left edge: fade to white (blends with hero text area) */
    body::before {
      content: ''; position: absolute; pointer-events: none; z-index: 10;
      top: 0; left: 0; bottom: 0; width: 18%;
      background: linear-gradient(to right, #fff 0%, rgba(255,255,255,0) 100%);
    }
    /* Right, top, bottom subtle fades */
    body::after {
      content: ''; position: absolute; pointer-events: none; z-index: 10;
      inset: 0;
      background:
        linear-gradient(to bottom, rgba(255,255,255,0.75) 0%, transparent 14%, transparent 88%, rgba(255,255,255,0.55) 100%),
        linear-gradient(to left,  rgba(255,255,255,0.45) 0%, transparent 10%);
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';

const VW = 946, VH = 600;
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const dpr    = window.devicePixelRatio || 1;
let sx = 1, sy = 1;

function resize() {
  canvas.width  = canvas.clientWidth  * dpr;
  canvas.height = canvas.clientHeight * dpr;
  sx = canvas.width  / VW;
  sy = canvas.height / VH;
  ctx.lineJoin = 'round';
  ctx.lineCap  = 'round';
}
window.addEventListener('resize', resize);
resize();

// ── Cubic bezier strings ─────────────────────────────────────────────
// Each string: { pts:[x0,y0,cx1,cy1,cx2,cy2,x1,y1], w:lineWidth, base:baseAlpha }
// Origins fan from top-right; converge toward bottom-center (≈ center of full hero section)
// All strings fan from a tight top-right origin cluster.
// First 10: wide arcs that sweep through the center of the panel.
// Last 10: gentler arcs that fill the right portion.
const STRINGS = [
  // Wide sweeps — cross the center, land spread across bottom-left
  { pts: [946,  4,  660,  55,  255, 488,   22, 600], w: 2.10, base: 0.28 },
  { pts: [946,  7,  685,  65,  278, 496,   54, 600], w: 2.00, base: 0.27 },
  { pts: [946, 11,  708,  78,  300, 503,   88, 600], w: 1.90, base: 0.26 },
  { pts: [946, 16,  728,  92,  320, 508,  122, 600], w: 1.80, base: 0.25 },
  { pts: [946, 22,  746, 108,  340, 513,  155, 600], w: 1.70, base: 0.24 },
  { pts: [946, 29,  762, 126,  358, 518,  186, 600], w: 1.65, base: 0.23 },
  { pts: [946, 37,  774, 144,  374, 522,  215, 600], w: 1.60, base: 0.22 },
  { pts: [946, 46,  785, 164,  390, 526,  241, 600], w: 1.55, base: 0.22 },
  { pts: [946, 56,  794, 185,  404, 529,  265, 600], w: 1.50, base: 0.21 },
  { pts: [946, 67,  801, 207,  417, 532,  287, 600], w: 1.45, base: 0.21 },
  // Gentle arcs — fill the right side, land bottom-center
  { pts: [946,  80,  808, 230,  429, 535,  307, 600], w: 1.40, base: 0.20 },
  { pts: [946,  96,  813, 255,  440, 537,  325, 600], w: 1.35, base: 0.19 },
  { pts: [946, 115,  818, 280,  449, 539,  341, 600], w: 1.30, base: 0.19 },
  { pts: [946, 140,  822, 306,  458, 541,  355, 600], w: 1.25, base: 0.18 },
  { pts: [946, 170,  826, 332,  466, 542,  368, 600], w: 1.20, base: 0.18 },
  { pts: [946, 206,  829, 358,  473, 544,  380, 600], w: 1.15, base: 0.17 },
  { pts: [946, 250,  832, 382,  479, 545,  391, 600], w: 1.10, base: 0.17 },
  { pts: [946, 302,  835, 406,  485, 547,  401, 600], w: 1.05, base: 0.16 },
  { pts: [946, 362,  837, 428,  490, 548,  411, 600], w: 1.00, base: 0.15 },
  { pts: [946, 432,  840, 450,  496, 550,  420, 600], w: 0.95, base: 0.15 },
];

// ── Arc-length LUT (even-speed surge travel) ─────────────────────────
const LUT_N = 100;

function buildLut(pts) {
  const table = [0];
  let px = pts[0], py = pts[1], total = 0;
  for (let i = 1; i <= LUT_N; i++) {
    const t = i / LUT_N, mt = 1 - t;
    const x = mt**3*pts[0] + 3*mt**2*t*pts[2] + 3*mt*t**2*pts[4] + t**3*pts[6];
    const y = mt**3*pts[1] + 3*mt**2*t*pts[3] + 3*mt*t**2*pts[5] + t**3*pts[7];
    total += Math.hypot(x - px, y - py);
    table.push(total);
    px = x; py = y;
  }
  return { table, total };
}
const luts = STRINGS.map(s => buildLut(s.pts));

function tAtDist(lut, d) {
  const target = Math.max(0, Math.min(d, lut.total));
  let lo = 0, hi = LUT_N;
  while (lo < hi - 1) {
    const mid = (lo + hi) >> 1;
    lut.table[mid] <= target ? lo = mid : hi = mid;
  }
  return (lo + (target - lut.table[lo]) / ((lut.table[hi] - lut.table[lo]) || 1)) / LUT_N;
}

function bPt(pts, t) {
  const mt = 1 - t;
  return {
    x: mt**3*pts[0] + 3*mt**2*t*pts[2] + 3*mt*t**2*pts[4] + t**3*pts[6],
    y: mt**3*pts[1] + 3*mt**2*t*pts[3] + 3*mt*t**2*pts[5] + t**3*pts[7],
  };
}

// ── Draw a string's base (faint static line) ─────────────────────────
function drawBase(s, lut) {
  const pts = s.pts;
  ctx.beginPath();
  ctx.moveTo(pts[0] * sx, pts[1] * sy);
  for (let i = 1; i <= 80; i++) {
    const p = bPt(pts, i / 80);
    ctx.lineTo(p.x * sx, p.y * sy);
  }
  ctx.strokeStyle = `rgba(16,120,243,${s.base})`;
  ctx.lineWidth   = s.w;
  ctx.stroke();
}

// ── Draw a traveling surge along a string ───────────────────────────
const SURGE_WIN = 0.22;  // gradient half-window as fraction of arc length

function drawSurge(s, lut, d) {
  const total = lut.total;
  const frac  = d / total;

  let edgeFade = 1;
  if (frac < 0.05) edgeFade = frac / 0.05;
  else if (frac > 0.90) edgeFade = Math.max(0, (1 - frac) / 0.10);
  if (edgeFade <= 0) return;

  const winHalf = total * SURGE_WIN;
  const dS = Math.max(0, d - winHalf * 0.75);
  const dE = Math.min(total, d + winHalf * 0.38);

  const tS = tAtDist(lut, dS);
  const tE = tAtDist(lut, dE);
  const tP = tAtDist(lut, Math.min(total, d));

  const pS = bPt(s.pts, tS);
  const pE = bPt(s.pts, tE);
  const peakStop = Math.max(0.01, Math.min(0.99, (tP - tS) / Math.max(0.001, tE - tS)));

  const steps  = 50;
  const tRange = tE - tS;

  // Build the curved path segment
  const buildPath = () => {
    ctx.beginPath();
    for (let i = 0; i <= steps; i++) {
      const p = bPt(s.pts, tS + (i / steps) * tRange);
      i === 0 ? ctx.moveTo(p.x*sx, p.y*sy) : ctx.lineTo(p.x*sx, p.y*sy);
    }
  };

  // Outer glow pass
  const gOuter = ctx.createLinearGradient(pS.x*sx, pS.y*sy, pE.x*sx, pE.y*sy);
  gOuter.addColorStop(0,         'rgba(16,120,243,0)');
  gOuter.addColorStop(peakStop,  `rgba(16,120,243,${(0.82 * edgeFade).toFixed(3)})`);
  gOuter.addColorStop(1,         'rgba(16,120,243,0)');
  buildPath();
  ctx.strokeStyle = gOuter;
  ctx.lineWidth   = 4.5;
  ctx.stroke();

  // Bright core pass
  const gCore = ctx.createLinearGradient(pS.x*sx, pS.y*sy, pE.x*sx, pE.y*sy);
  gCore.addColorStop(0,         'rgba(200,235,255,0)');
  gCore.addColorStop(peakStop,  `rgba(235,248,255,${(0.92 * edgeFade).toFixed(3)})`);
  gCore.addColorStop(1,         'rgba(200,235,255,0)');
  buildPath();
  ctx.strokeStyle = gCore;
  ctx.lineWidth   = 1.2;
  ctx.stroke();
}

// ── Surges ───────────────────────────────────────────────────────────
const SURGE_SPEED = 175;  // logical px/s

const surges = [];
STRINGS.forEach((_, i) => {
  const total = luts[i].total;
  const count = Math.random() > 0.4 ? 2 : 1;
  for (let k = 0; k < count; k++) {
    surges.push({
      li:    i,
      d:     Math.random() * total,
      speed: SURGE_SPEED * (0.80 + Math.random() * 0.40),
    });
  }
});

// ── Render loop ───────────────────────────────────────────────────────
let last = 0;
function frame(ts) {
  if (!last) last = ts;
  const dt = Math.min((ts - last) / 1000, 0.05);
  last = ts;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  STRINGS.forEach((s, i) => drawBase(s, luts[i]));

  surges.forEach(sg => {
    const lut  = luts[sg.li];
    const winHalf = lut.total * SURGE_WIN * 0.75;
    sg.d += sg.speed * dt;
    if (sg.d > lut.total + winHalf) {
      sg.d = -winHalf;
      sg.speed = SURGE_SPEED * (0.80 + Math.random() * 0.40);
    }
    if (sg.d > 0) drawSurge(STRINGS[sg.li], lut, sg.d);
  });

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
