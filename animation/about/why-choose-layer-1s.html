'use strict';

// ── Virtual canvas ────────────────────────────────────────────────────
const VW = 640, VH = 560;
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const dpr    = window.devicePixelRatio || 1;
let scale = 1, offX = 0, offY = 0;

function resize() {
  canvas.width  = Math.round(window.innerWidth  * dpr);
  canvas.height = Math.round(window.innerHeight * dpr);
  // Uniform scale — circles stay perfectly round regardless of window aspect ratio
  scale = Math.min(canvas.width / VW, canvas.height / VH);
  offX  = (canvas.width  - VW * scale) * 0.5;
  offY  = (canvas.height - VH * scale) * 0.5;
}
window.addEventListener('resize', resize);

// ── Dot grid (live — cursor proximity glow) ───────────────────────────
// ── Dot grid — grey variant ────────────────────────────────────────────
// Drawn inside ctx.scale(scale,scale) — coords/radius in logical VW/VH units.
// rgba(0,0,0) | spacing 36px | r = 1.4*f | opacity f*0.22
// cursor 130px: r *= 1+1.8u, opacity min(0.35, op*(1+0.5u))
function drawGrid() {
  const spacing = 36;
  const cx = VW / 2, cy = VH / 2;
  const maxDist = 800;
  for (let x = spacing / 2; x < VW; x += spacing) {
    for (let y = spacing / 2; y < VH; y += spacing) {
      const dx = x - cx, dy = y - cy;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > maxDist) continue;
      const f = 1 - dist / maxDist;
      let r = 1.4 * f;
      if (r < 0.1) continue;
      let opacity = f * 0.22;
      if (mx > -9000) {
        const dmx = x - mx, dmy = y - my;
        const md = Math.sqrt(dmx * dmx + dmy * dmy);
        if (md < 130) { const u = 1 - md / 130; r *= 1 + 1.8 * u; opacity = Math.min(0.35, opacity * (1 + 0.5 * u)); }
      }
      ctx.fillStyle = `rgba(0,0,0,${opacity.toFixed(3)})`;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

// ── Bubble definitions — sizes from Figma ─────────────────────────────
// Sizes: Cardano=128px, Hedera=156px, Varmeta=192px, Eclipse=128px, Sui=156px
// Home positions spaced to have natural gaps between all bubbles
const DEFS = [
  { key:'varmeta', r:96, hx:320, hy:280, anchor:true,  padX:32, padY:28, gFrom:'#ffffff', gTo:'#ffffff', border:'rgba(142,213,255,0.75)', phase:0.00 },
  { key:'cardano', r:64, hx:192, hy:199, anchor:false, padX:24, padY:24, gFrom:'#ffffff', gTo:'#ffffff',  border:'rgba(0,0,0,0.07)',    phase:1.10 },
  { key:'hedera',  r:78, hx:494, hy:156, anchor:false, padX:32, padY:24, gFrom:'#ffffff', gTo:'#ffffff',  border:'rgba(0,0,0,0.07)',    phase:2.30 },
  { key:'eclipse', r:64, hx:518, hy:366, anchor:false, padX:24, padY:24, gFrom:'#ffffff', gTo:'#ffffff',  border:'rgba(0,0,0,0.07)',    phase:3.70 },
  { key:'sui',     r:78, hx:220, hy:430, anchor:false, padX:32, padY:24, gFrom:'#ffffff', gTo:'#ffffff',  border:'rgba(0,0,0,0.07)',    phase:5.20 },
];
const bubbles = DEFS.map(d => ({ ...d, x:d.hx, y:d.hy, vx:0, vy:0 }));
const anch    = bubbles[0];

// ── Physics ────────────────────────────────────────────────────────────
const FAMP       = 0.010;  // float oscillation amplitude
const DAMP       = 0.980;  // near-zero-gravity feel
const K_ORBIT    = 0.0006; // orbital spring (partners ↔ Varmeta)
const ORBIT_D    = 155;    // desired orbital distance from Varmeta center
const MAX_WANDER = 44;     // max drift from home before tether kicks in
const K_TETHER   = 0.0010; // tether spring beyond MAX_WANDER
const REP_R      = 118;    // cursor radius
const REP_P      = 1.8;    // cursor force on partners
const REP_V      = 0.18;   // cursor force on Varmeta — barely moves it

// ── Cursor ────────────────────────────────────────────────────────────
let mx = -9999, my = -9999;
canvas.addEventListener('mousemove', e => {
  const r  = canvas.getBoundingClientRect();
  const px = (e.clientX - r.left) * (canvas.width  / r.width);
  const py = (e.clientY - r.top)  * (canvas.height / r.height);
  mx = (px - offX) / scale;
  my = (py - offY) / scale;
});
canvas.addEventListener('mouseleave', () => { mx = -9999; my = -9999; });

// ── Draw one bubble ───────────────────────────────────────────────────
function drawBubble(b) {
  const { x, y, r, key, padX, padY, gFrom, gTo, border } = b;
  const img = imgs[key];

  // Gradient fill
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  const g = ctx.createLinearGradient(x, y - r, x, y + r);
  g.addColorStop(0, gFrom);
  g.addColorStop(1, gTo);
  ctx.fillStyle = g;
  ctx.fill();

  // Logo — contain fit, never stretch
  if (img && img.complete && img.naturalWidth > 0) {
    const bw = (r - padX) * 2, bh = (r - padY) * 2;
    const ar = img.naturalWidth / img.naturalHeight;
    let dw, dh;
    if (ar >= bw / bh) { dw = bw; dh = bw / ar; }
    else               { dh = bh; dw = bh * ar; }
    ctx.save();
    ctx.beginPath();
    ctx.arc(x, y, r - 1, 0, Math.PI * 2);
    ctx.clip();
    ctx.drawImage(img, x - dw * 0.5, y - dh * 0.5, dw, dh);
    ctx.restore();
  }

  // Border ring
  ctx.beginPath();
  ctx.arc(x, y, r - 0.5, 0, Math.PI * 2);
  ctx.strokeStyle = border || '#eef8ff';
  ctx.lineWidth   = 1;
  ctx.stroke();
}

// ── Render loop ───────────────────────────────────────────────────────
let lastTs = 0;

function frame(ts) {
  const dt = Math.min((ts - lastTs) / 1000, 0.05);
  lastTs = ts;

  for (let i = 0; i < bubbles.length; i++) {
    const b = bubbles[i];

    // Shared: organic zero-gravity float
    b.vx += Math.sin(ts * 0.00075 + b.phase)        * FAMP;
    b.vy += Math.cos(ts * 0.00059 + b.phase * 1.41) * FAMP * 0.9;

    if (b.anchor) {
      // Varmeta: very soft home pull, barely responds to cursor
      b.vx += (b.hx - b.x) * 0.002;
      b.vy += (b.hy - b.y) * 0.002;
      if (mx > -9000) {
        const dx = b.x - mx, dy = b.y - my, d = Math.hypot(dx, dy);
        if (d < REP_R && d > 0.5) {
          const ed = Math.max(d, b.r);  // force peaks at bubble surface, not core
          const f  = Math.pow(1 - ed / REP_R, 2) * REP_V;
          b.vx += dx / d * f; b.vy += dy / d * f;
        }
      }
    } else {
      // Orbital spring toward target distance from Varmeta
      const tvx = anch.x - b.x, tvy = anch.y - b.y;
      const td  = Math.hypot(tvx, tvy);
      if (td > 0.5) {
        const err = td - ORBIT_D;
        b.vx += (tvx / td) * err * K_ORBIT;
        b.vy += (tvy / td) * err * K_ORBIT;
      }
      // Home tether: gentle pull back if drifted beyond MAX_WANDER
      const hdx = b.hx - b.x, hdy = b.hy - b.y, hd = Math.hypot(hdx, hdy);
      if (hd > MAX_WANDER) {
        const excess = hd - MAX_WANDER;
        b.vx += (hdx / hd) * excess * K_TETHER;
        b.vy += (hdy / hd) * excess * K_TETHER;
      }
      // Cursor repulsion — force peaks at bubble surface (ed = max(d, b.r))
      if (mx > -9000) {
        const dx = b.x - mx, dy = b.y - my, d = Math.hypot(dx, dy);
        if (d < REP_R && d > 0.5) {
          const ed = Math.max(d, b.r);
          const f  = Math.pow(1 - ed / REP_R, 2) * REP_P;
          b.vx += dx / d * f; b.vy += dy / d * f;
        }
      }
      // Soft wall
      if (b.x < b.r + 4)      b.vx += 0.35;
      if (b.x > VW - b.r - 4) b.vx -= 0.35;
      if (b.y < b.r + 4)      b.vy += 0.35;
      if (b.y > VH - b.r - 4) b.vy -= 0.35;
    }

    // Bubble separation — prevents any border crossing, uses each bubble's actual radius
    for (let j = i + 1; j < bubbles.length; j++) {
      const o   = bubbles[j];
      const sdx = b.x - o.x, sdy = b.y - o.y;
      const sd  = Math.hypot(sdx, sdy);
      const sep = b.r + o.r;
      if (sd < sep && sd > 0.01) {
        const nx = sdx / sd, ny = sdy / sd;
        const cor = (sep - sd) * 0.5;
        b.x += nx * cor; b.y += ny * cor;
        o.x -= nx * cor; o.y -= ny * cor;
        const dot = (b.vx - o.vx) * nx + (b.vy - o.vy) * ny;
        if (dot < 0) {
          const imp = dot * 0.25;
          b.vx -= nx * imp; b.vy -= ny * imp;
          o.vx += nx * imp; o.vy += ny * imp;
        }
      }
    }

    b.vx *= DAMP; b.vy *= DAMP;
    b.x  += b.vx; b.y  += b.vy;
  }

  // Draw
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.save();
  ctx.translate(offX, offY);
  ctx.scale(scale, scale);

  // Dot background with cursor proximity glow
  drawGrid();

  // Bubbles, back-to-front by y
  bubbles.slice().sort((a, b) => a.y - b.y).forEach(drawBubble);

  ctx.restore();
  requestAnimationFrame(frame);
}

resize();
requestAnimationFrame(frame);
</script>
