<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>About — 3D Node Network</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html {
      width: 100%;
      height: 100%;
      background-color: rgba(255, 255, 255, 0.01); /* Workaround for Chromium iframe blending/transparency bug */
    }
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      position: relative;
    }
    body::before {
      content: '';
      position: absolute;
      top: 0; left: 0; bottom: 0; width: 15%;
      background: linear-gradient(to right, #fff 0%, rgba(255,255,255,0) 100%);
      pointer-events: none;
      z-index: 10;
    }
    body::after {
      content: '';
      position: absolute;
      top: 0; right: 0; bottom: 0; width: 15%;
      background: linear-gradient(to left, #fff 0%, rgba(255,255,255,0) 100%);
      pointer-events: none;
      z-index: 10;
    }
    canvas { display:block; width:100%; height:100%; background: transparent; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';

// ── Logical coordinate space (about hero section) ───────────────────
const VW = 946, VH = 600;

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const dpr    = window.devicePixelRatio || 1;
let sx = 1, sy = 1;

function resize() {
  canvas.width  = canvas.clientWidth  * dpr;
  canvas.height = canvas.clientHeight * dpr;
  sx = canvas.width  / VW;
  sy = canvas.height / VH;
}
window.addEventListener('resize', resize);
resize();

// ── Camera / projection (pseudo-3D) ─────────────────────────────────
const FOCAL = 820;   // perspective focal length
const CAM_Z = 620;   // camera distance from world origin
const CX = VW / 2;
const CY = VH / 2;
const R  = 185;      // radius of the spherical node cloud (fits VH with 48px padding)

// ── Colour helpers (DESIGN_DNA) ─────────────────────────────────────
function lerpRGBA(r0,g0,b0,a0, r1,g1,b1,a1, t){
  return `rgba(${(r0+(r1-r0)*t+.5)|0},${(g0+(g1-g0)*t+.5)|0},${(b0+(b1-b0)*t+.5)|0},${(a0+(a1-a0)*t).toFixed(3)})`;
}
// Travel / primary blue 16,120,243 · secondary 142,213,255

// ── Build the node cloud ────────────────────────────────────────────
// Deterministic pseudo-random so the layout is stable across reloads.
let seed = 20240614;
function rnd(){ seed = (seed * 1664525 + 1013904223) >>> 0; return seed / 4294967296; }

const N_NODES = 30;
const nodes = [];
for (let i = 0; i < N_NODES; i++) {
  // Distribute uniformly within a sphere so the cloud reads as a 3D ball.
  let x, y, z, d;
  do {
    x = (rnd() * 2 - 1);
    y = (rnd() * 2 - 1);
    z = (rnd() * 2 - 1);
    d = x*x + y*y + z*z;
  } while (d > 1);
  nodes.push({
    bx: x * R,                   // base position — uniform spherical cloud
    by: y * R,
    bz: z * R,
    // per-node float wobble
    pa: rnd() * Math.PI * 2,
    pb: rnd() * Math.PI * 2,
    fr: 0.5 + rnd() * 0.6,       // float rate
    size: 2.6 + rnd() * 2.4,     // base node radius (logical px @ scale 1)
    glow: 0,                     // 0..1 data-arrival glow
    // live rotated + projected values (filled each frame)
    x:0, y:0, z:0, scale:1, depth:0, sxp:0, syp:0
  });
}

// ── Edges: connect nodes within a 3D distance threshold ─────────────
const EDGE_DIST = R * 0.92;
const edges = [];
for (let i = 0; i < N_NODES; i++) {
  for (let j = i + 1; j < N_NODES; j++) {
    const dx = nodes[i].bx - nodes[j].bx;
    const dy = nodes[i].by - nodes[j].by;
    const dz = nodes[i].bz - nodes[j].bz;
    const dist = Math.hypot(dx, dy, dz);
    if (dist < EDGE_DIST) edges.push({ a:i, b:j, len:dist });
  }
}
// Build adjacency for pulse routing
const adj = Array.from({length: N_NODES}, () => []);
edges.forEach((e, ei) => { adj[e.a].push({ ei, other:e.b }); adj[e.b].push({ ei, other:e.a }); });

// ── Data pulses travelling along edges ──────────────────────────────
const pulses = [];
const PULSE_SPEED = 150;   // logical px / second
function spawnPulse(fromNode){
  const links = adj[fromNode];
  if (!links.length) return;
  const link = links[(rnd() * links.length) | 0];
  pulses.push({ ei: link.ei, from: fromNode, to: link.other, t: 0,
                speed: PULSE_SPEED / Math.max(40, edges[link.ei].len) });
}
let pulseTimer = 0;

// ── Mouse parallax + proximity glow ─────────────────────────────────
let mx = CX, my = CY, mInside = false;
function setMouse(clientX, clientY){
  const r = canvas.getBoundingClientRect();
  mx = (clientX - r.left) / r.width  * VW;
  my = (clientY - r.top)  / r.height * VH;
}
window.addEventListener('pointermove', e => { setMouse(e.clientX, e.clientY); mInside = true; });
window.addEventListener('pointerleave', () => { mInside = false; });
// Accept forwarded pointer from an embedding page (matches globe pattern)
window.addEventListener('message', e => {
  const d = e.data;
  if (d && d.type === 'parentpointer') {
    mx = (d.x / d.w) * VW; my = (d.y / d.h) * VH; mInside = true;
  }
});

// ── Animation loop ──────────────────────────────────────────────────
const SPIN_RATE = 0.085;   // rad / s around Y
let ay = 0.4, ax = 0;
let last = performance.now();
let tiltX = 0, tiltY = 0;   // eased mouse parallax

function frame(now){
  const dt = Math.min(0.05, (now - last) / 1000);
  last = now;
  const tSec = now / 1000;

  // Glow easing constants (DESIGN_DNA)
  const kRise = 1 - Math.pow(0.003, dt);
  const kFall = 1 - Math.pow(0.030, dt);

  // Auto-spin + eased parallax tilt toward cursor
  ay += SPIN_RATE * dt;
  const tgtTiltY = mInside ? (mx / VW - 0.5) * 0.5 : 0;
  const tgtTiltX = mInside ? (my / VH - 0.5) * 0.32 : 0;
  tiltY += (tgtTiltY - tiltY) * (1 - Math.pow(0.02, dt));
  tiltX += (tgtTiltX - tiltX) * (1 - Math.pow(0.02, dt));

  const ry = ay + tiltY;
  const rx = ax + tiltX;
  const cosY = Math.cos(ry), sinY = Math.sin(ry);
  const cosX = Math.cos(rx), sinX = Math.sin(rx);

  // Project every node
  for (const n of nodes) {
    // gentle float wobble in world space
    const wob = 9;
    const fx = n.bx + Math.sin(tSec * n.fr + n.pa) * wob;
    const fy = n.by + Math.cos(tSec * n.fr * 0.8 + n.pb) * wob;
    const fz = n.bz + Math.sin(tSec * n.fr * 0.6 + n.pa * 1.7) * wob;

    // rotate Y then X
    let x1 =  fx * cosY + fz * sinY;
    let z1 = -fx * sinY + fz * cosY;
    let y1 =  fy * cosX - z1 * sinX;
    let z2 =  fy * sinX + z1 * cosX;

    const depth = CAM_Z + z2;
    const scale = FOCAL / depth;
    n.x = x1; n.y = y1; n.z = z2;
    n.depth = depth;
    n.scale = scale;
    n.sxp = CX + x1 * scale;
    n.syp = CY + y1 * scale;

    // ease glow back down
    n.glow += (0 - n.glow) * kFall;
  }

  // Spawn pulses periodically
  pulseTimer -= dt;
  if (pulseTimer <= 0 && pulses.length < 14) {
    pulseTimer = 0.18 + rnd() * 0.4;
    spawnPulse((rnd() * N_NODES) | 0);
  }
  // Advance pulses
  for (let i = pulses.length - 1; i >= 0; i--) {
    const p = pulses[i];
    p.t += p.speed * dt;
    // light up endpoints as the pulse nears them
    const na = nodes[p.from], nb = nodes[p.to];
    na.glow = Math.max(na.glow, Math.max(0, 1 - p.t * 2.2));
    nb.glow = Math.max(nb.glow, Math.max(0, 1 - (1 - p.t) * 2.2));
    if (p.t >= 1) {
      nb.glow = Math.min(1, nb.glow + 0.9);
      pulses.splice(i, 1);
      if (rnd() < 0.55) spawnPulse(p.to);   // chain onward
    }
  }

  // ── Render ───────────────────────────────────────────────────────
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);
  ctx.scale(canvas.clientWidth / VW, canvas.clientHeight / VH);

  // Depth fog: map node depth to 0 (far) .. 1 (near)
  const FAR = CAM_Z + R * 1.4, NEAR = CAM_Z - R * 1.4;
  const fog = d => Math.max(0, Math.min(1, (FAR - d) / (FAR - NEAR)));

  // 1) Edges — far to near
  const edgeOrder = edges.map((e, i) => i)
    .sort((a, b) => (nodes[edges[b].a].depth + nodes[edges[b].b].depth)
                  - (nodes[edges[a].a].depth + nodes[edges[a].b].depth));
  for (const ei of edgeOrder) {
    const e = edges[ei];
    const a = nodes[e.a], b = nodes[e.b];
    const f = (fog(a.depth) + fog(b.depth)) * 0.5;
    const baseA = 0.05 + f * 0.32;
    ctx.beginPath();
    ctx.moveTo(a.sxp, a.syp);
    ctx.lineTo(b.sxp, b.syp);
    ctx.strokeStyle = lerpRGBA(142,213,255,0.0, 142,213,255,1.0, baseA);
    ctx.lineWidth = 0.5 + f * 1.0;
    ctx.stroke();
  }

  // 2) Travelling pulses (on top of edges, behind nearest nodes)
  for (const p of pulses) {
    const a = nodes[p.from], b = nodes[p.to];
    const px = a.sxp + (b.sxp - a.sxp) * p.t;
    const py = a.syp + (b.syp - a.syp) * p.t;
    const f = fog(a.depth + (b.depth - a.depth) * p.t);
    const sc = a.scale + (b.scale - a.scale) * p.t;

    // comet trail
    const tx = a.sxp + (b.sxp - a.sxp) * Math.max(0, p.t - 0.16);
    const ty = a.syp + (b.syp - a.syp) * Math.max(0, p.t - 0.16);
    const grad = ctx.createLinearGradient(tx, ty, px, py);
    grad.addColorStop(0, 'rgba(16,120,243,0)');
    grad.addColorStop(1, `rgba(16,120,243,${(0.85 * f).toFixed(3)})`);
    ctx.beginPath();
    ctx.moveTo(tx, ty); ctx.lineTo(px, py);
    ctx.strokeStyle = grad;
    ctx.lineWidth = (1.0 + 1.4 * f) * sc;
    ctx.lineCap = 'round';
    ctx.stroke();
    ctx.lineCap = 'butt';

    // head
    ctx.beginPath();
    ctx.arc(px, py, (1.6 + 1.2 * f) * sc, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(16,120,243,${(0.95 * f).toFixed(3)})`;
    ctx.fill();
  }

  // 3) Nodes — far to near
  const nodeOrder = nodes.map((_, i) => i).sort((a, b) => nodes[b].depth - nodes[a].depth);
  for (const ni of nodeOrder) {
    const n = nodes[ni];
    const f = fog(n.depth);
    const r = n.size * n.scale;

    // cursor proximity glow (screen-space)
    let prox = 0;
    if (mInside) {
      const dd = Math.hypot(n.sxp - mx, n.syp - my);
      if (dd < 120) prox = 1 - dd / 120;
    }
    const gl = Math.min(1, Math.max(n.glow, prox * 0.85));

    // soft halo when glowing
    if (gl > 0.02) {
      const hr = r * (2.4 + gl * 2.0);
      const hg = ctx.createRadialGradient(n.sxp, n.syp, 0, n.sxp, n.syp, hr);
      hg.addColorStop(0, `rgba(16,120,243,${(0.30 * gl * f).toFixed(3)})`);
      hg.addColorStop(1, 'rgba(16,120,243,0)');
      ctx.beginPath();
      ctx.arc(n.sxp, n.syp, hr, 0, Math.PI * 2);
      ctx.fillStyle = hg;
      ctx.fill();
    }

    // Shaded 3D sphere: lit highlight (upper-left) → mid body → darker rim.
    // Body colour blends idle blue → primary blue with glow; depth fades alpha.
    const alpha = 0.55 + 0.45 * f;
    // mid-tone body: secondary blue at rest, lifts toward primary on glow
    const midR = (142 + (16  - 142) * gl) | 0;
    const midG = (213 + (120 - 213) * gl) | 0;
    const midB = (255 + (243 - 255) * gl) | 0;
    // rim (darker shade of the body for volume)
    const rimR = (midR * 0.45) | 0, rimG = (midG * 0.55) | 0, rimB = (midB * 0.78) | 0;

    const hx = n.sxp - r * 0.36, hy = n.syp - r * 0.36;   // highlight offset
    const sg = ctx.createRadialGradient(hx, hy, r * 0.05, n.sxp, n.syp, r * 1.05);
    sg.addColorStop(0.00, `rgba(255,255,255,${alpha.toFixed(3)})`);
    sg.addColorStop(0.35, `rgba(${midR},${midG},${midB},${alpha.toFixed(3)})`);
    sg.addColorStop(1.00, `rgba(${rimR},${rimG},${rimB},${alpha.toFixed(3)})`);
    ctx.beginPath();
    ctx.arc(n.sxp, n.syp, r, 0, Math.PI * 2);
    ctx.fillStyle = sg;
    ctx.fill();

    // crisp rim light for definition against the white background
    ctx.lineWidth = (0.6 + 0.5 * f) * n.scale;
    ctx.strokeStyle = lerpRGBA(89,188,255, 0.30 + 0.35*f, 16,120,243, 0.7 + 0.3*f, gl);
    ctx.stroke();
  }

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
