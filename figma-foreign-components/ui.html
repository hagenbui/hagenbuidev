<!DOCTYPE html>
<html>
<head>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 16px;
      transition: background-color 0.2s, color 0.2s;
    }
    
    /* Light theme (default) */
    body {
      --bg-primary: #ffffff;
      --bg-secondary: #f8fafc;
      --bg-tertiary: #f1f5f9;
      --bg-hover: #e2e8f0;
      --bg-accent: #3b82f6;
      --bg-accent-hover: #2563eb;
      --border: #e2e8f0;
      --text-primary: #0f172a;
      --text-secondary: #64748b;
      --text-tertiary: #94a3b8;
      --text-on-accent: #ffffff;
      --shadow: rgba(0, 0, 0, 0.1);
      --debug-bg: #1e293b;
      --debug-text: #e2e8f0;
    }
    
    /* Dark theme */
    body.figma-dark {
      --bg-primary: #1e1e1e;
      --bg-secondary: #2a2a2a;
      --bg-tertiary: #333333;
      --bg-hover: #3d3d3d;
      --bg-accent: #3b82f6;
      --bg-accent-hover: #2563eb;
      --border: #404040;
      --text-primary: #ffffff;
      --text-secondary: #a1a1a1;
      --text-tertiary: #737373;
      --text-on-accent: #ffffff;
      --shadow: rgba(0, 0, 0, 0.3);
      --debug-bg: #0f172a;
      --debug-text: #cbd5e1;
    }
    
    body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
    }
    
    .main-container {
      display: flex;
      height: calc(100vh - 32px);
      gap: 16px;
    }
    
    .left-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 320px;
      overflow: hidden;
    }
    
    .right-panel {
      width: 320px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .header {
      margin-bottom: 16px;
    }
    
    .scan-button {
      width: 100%;
      padding: 10px 16px;
      background: var(--bg-accent);
      color: var(--text-on-accent);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 500;
      transition: background 0.2s;
      box-shadow: 0 1px 2px var(--shadow);
    }
    
    .scan-button:hover:not(:disabled) {
      background: var(--bg-accent-hover);
    }
    
    .scan-button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    
    .content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      border-radius: 8px;
      background: var(--bg-secondary);
      padding: 8px;
      border: 1px solid var(--border);
    }
    
    .content::-webkit-scrollbar {
      width: 8px;
    }
    
    .content::-webkit-scrollbar-track {
      background: transparent;
    }
    
    .content::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }
    
    .content::-webkit-scrollbar-thumb:hover {
      background: var(--text-tertiary);
    }
    
    .library-section {
      margin-bottom: 8px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg-primary);
      overflow: hidden;
      transition: border-color 0.2s;
    }
    
    .library-section:hover {
      border-color: var(--text-tertiary);
    }
    
    .library-header {
      padding: 12px 16px;
      background: var(--bg-secondary);
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background 0.2s;
      user-select: none;
    }
    
    .library-header:hover {
      background: var(--bg-hover);
    }
    
    .library-content {
      display: none;
    }
    
    .master-section {
      border-top: 1px solid var(--border);
    }
    
    .master-header {
      padding: 10px 16px 10px 32px;
      background: var(--bg-tertiary);
      font-weight: 500;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background 0.2s;
      user-select: none;
    }
    
    .master-header:hover {
      background: var(--bg-hover);
    }
    
    .instance-list {
      list-style: none;
      display: none;
    }
    
    .instance-item {
      padding: 10px 16px 10px 48px;
      border-top: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .instance-item:hover {
      background: var(--bg-hover);
    }
    
    .instance-name {
      font-weight: 500;
      font-size: 13px;
      margin-bottom: 4px;
      color: var(--text-primary);
    }
    
    .instance-path {
      font-size: 11px;
      color: var(--text-secondary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    
    .count-badge {
      background: var(--bg-accent);
      color: var(--text-on-accent);
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
    }
    
    .chevron {
      display: inline-block;
      margin-right: 8px;
      transition: transform 0.2s;
      font-size: 10px;
      color: var(--text-secondary);
    }
    
    .chevron.expanded {
      transform: rotate(90deg);
    }
    
    .no-components {
      padding: 48px 24px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 14px;
    }
    
    .loading-spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--text-on-accent);
      border-radius: 50%;
      border-top-color: transparent;
      animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .debug-header {
      padding: 12px 16px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px 8px 0 0;
      font-weight: 600;
      font-size: 13px;
      color: var(--text-primary);
    }
    
    .debug-content {
      flex: 1;
      overflow-y: auto;
      font-family: 'SF Mono', 'Monaco', 'Cascadia Code', monospace;
      font-size: 11px;
      padding: 12px;
      background: var(--debug-bg);
      color: var(--debug-text);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 8px 8px;
      line-height: 1.5;
    }
    
    .debug-content::-webkit-scrollbar {
      width: 8px;
    }
    
    .debug-content::-webkit-scrollbar-track {
      background: transparent;
    }
    
    .debug-content::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 4px;
    }
    
    .debug-line {
      margin: 4px 0;
      word-wrap: break-word;
      white-space: pre-wrap;
    }
    
    .debug-line.timestamp {
      color: #60a5fa;
    }
    
    .debug-line.data {
      color: #86efac;
      padding-left: 16px;
      font-size: 10px;
    }
  </style>
</head>
<body>
  <div class="main-container">
    <div class="left-panel">
      <div class="header">
        <button class="scan-button" id="scanButton">
          <span>Scan for Foreign Components</span>
        </button>
      </div>
      <div class="content" id="results">
        <div id="componentList"></div>
      </div>
    </div>
    <div class="right-panel">
      <div class="debug-header">Debug Console</div>
      <div class="debug-content" id="debugConsole"></div>
    </div>
  </div>

  <script>
    const scanButton = document.getElementById('scanButton');
    const componentList = document.getElementById('componentList');
    const debugConsole = document.getElementById('debugConsole');
    
    function applyTheme() {
      const theme = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      if (theme === 'dark') {
        document.body.classList.add('figma-dark');
      } else {
        document.body.classList.remove('figma-dark');
      }
    }
    
    applyTheme();
    
    if (window.matchMedia) {
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', applyTheme);
    }
    
    function log(message, data = null) {
      const line = document.createElement('div');
      line.className = 'debug-line timestamp';
      const timestamp = new Date().toLocaleTimeString();
      line.textContent = '[' + timestamp + '] ' + message;
      debugConsole.appendChild(line);
      
      if (data) {
        const dataLine = document.createElement('div');
        dataLine.className = 'debug-line data';
        dataLine.textContent = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
        debugConsole.appendChild(dataLine);
      }
      debugConsole.scrollTop = debugConsole.scrollHeight;
    }
    
    function setLoading(isLoading) {
      if (isLoading) {
        scanButton.disabled = true;
        scanButton.innerHTML = '<div class="loading-spinner"></div><span>Scanning...</span>';
      } else {
        scanButton.disabled = false;
        scanButton.innerHTML = '<span>Scan for Foreign Components</span>';
      }
    }
    
    function toggleSection(element, contentId) {
      const content = document.getElementById(contentId);
      const chevron = element.querySelector('.chevron');
      const isHidden = content.style.display === 'none' || content.style.display === '';
      content.style.display = isHidden ? 'block' : 'none';
      if (chevron) {
        chevron.classList.toggle('expanded', isHidden);
      }
    }
    
    scanButton.onclick = function() {
      log('Starting component scan...');
      setLoading(true);
      componentList.innerHTML = '';
      debugConsole.innerHTML = '';
      parent.postMessage({ pluginMessage: { type: 'find-components' } }, '*');
    };

    onmessage = function(event) {
      const message = event.data.pluginMessage;
      
      if (message.type === 'progress') {
        log(message.message);
      } else if (message.type === 'foreign-components-found') {
        log('Found ' + message.components.length + ' foreign components');
        setLoading(false);
        componentList.innerHTML = '';
        
        if (!message.components || message.components.length === 0) {
          componentList.innerHTML = '<div class="no-components">No foreign components found</div>';
          return;
        }
        
        const groupedComponents = message.components.reduce(function(acc, component) {
          const libraryName = component.libraryName || 'Unknown Library';
          const masterComponent = component.masterComponentName || 'Other Components';
          
          if (!acc[libraryName]) {
            acc[libraryName] = {};
          }
          if (!acc[libraryName][masterComponent]) {
            acc[libraryName][masterComponent] = [];
          }
          acc[libraryName][masterComponent].push(component);
          return acc;
        }, {});
        
        log('Grouped into ' + Object.keys(groupedComponents).length + ' libraries');
        
        Object.entries(groupedComponents).forEach(function(entry, libraryIndex) {
          const libraryName = entry[0];
          const masterComponents = entry[1];
          const librarySection = document.createElement('div');
          librarySection.className = 'library-section';
          
          const totalInstances = Object.values(masterComponents).flat().length;
          
          const libraryContentId = 'library-' + libraryIndex;
          librarySection.innerHTML = '<div class="library-header" onclick="toggleSection(this, \'' + libraryContentId + '\')"><div><span class="chevron">▶</span><span>' + libraryName + '</span></div><span class="count-badge">' + totalInstances + '</span></div><div class="library-content" id="' + libraryContentId + '"></div>';
          
          const libraryContent = librarySection.querySelector('.library-content');
          
          Object.entries(masterComponents).forEach(function(masterEntry, masterIndex) {
            const masterName = masterEntry[0];
            const instances = masterEntry[1];
            const masterSection = document.createElement('div');
            masterSection.className = 'master-section';
            const masterContentId = 'master-' + libraryIndex + '-' + masterIndex;
            
            masterSection.innerHTML = '<div class="master-header" onclick="toggleSection(this, \'' + masterContentId + '\')"><div><span class="chevron">▶</span><span>' + masterName + '</span></div><span class="count-badge">' + instances.length + '</span></div><ul class="instance-list" id="' + masterContentId + '"></ul>';
            
            const instanceList = masterSection.querySelector('.instance-list');
            
            instances.forEach(function(instance) {
              const li = document.createElement('li');
              li.className = 'instance-item';
              li.onclick = function() {
                log('Selected:', { name: instance.name, path: instance.path });
                parent.postMessage({
                  pluginMessage: {
                    type: 'select-component',
                    id: instance.id
                  }
                }, '*');
              };
              
              li.innerHTML = '<div class="instance-name">' + instance.name + '</div><div class="instance-path">' + instance.path + '</div>';
              
              instanceList.appendChild(li);
            });
            
            libraryContent.appendChild(masterSection);
          });
          
          componentList.appendChild(librarySection);
        });
        
        log('Component list rendered');
      } else if (message.type === 'debug') {
        log(message.message, message.data);
      }
    };
  </script>
</body>
</html>
