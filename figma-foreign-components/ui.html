<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 10px;
      min-width: 300px;
      min-height: 200px;
      overflow: hidden;
    }
    
    .container {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    
    .header {
      flex-shrink: 0;
      margin-bottom: 16px;
    }
    
    .content {
      flex-grow: 1;
      overflow-y: auto;
      min-height: 0;
    }
    
    .library-section {
      margin-bottom: 16px;
      border: 1px solid #e5e5e5;
      border-radius: 6px;
    }
    
    .library-header {
      padding: 8px 12px;
      background-color: #f5f5f5;
      font-weight: 600;
      border-bottom: 1px solid #e5e5e5;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .library-header:hover {
      background-color: #f0f0f0;
    }
    
    .master-component {
      padding: 8px 12px 8px 24px;
      border-bottom: 1px solid #e5e5e5;
      background-color: #fafafa;
      font-weight: 500;
    }
    
    .instance-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    
    .instance-item {
      padding: 8px 12px 8px 36px;
      border-bottom: 1px solid #e5e5e5;
      cursor: pointer;
    }
    
    .instance-item:hover {
      background-color: #f0f0f0;
    }
    
    .instance-name {
      font-weight: 500;
      margin-bottom: 4px;
    }
    
    .instance-path {
      font-size: 12px;
      color: #666;
    }
    
    .scan-button {
      width: 100%;
      padding: 8px 16px;
      background-color: #18A0FB;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    
    .scan-button:hover {
      background-color: #0D8EE9;
    }
    
    .scan-button:disabled {
      background-color: #cccccc;
      cursor: not-allowed;
    }
    
    .loading-spinner {
      width: 16px;
      height: 16px;
      border: 2px solid #ffffff;
      border-radius: 50%;
      border-top-color: transparent;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
    
    .count-badge {
      background-color: #e5e5f5;
      padding: 2px 6px;
      border-radius: 10px;
      font-size: 12px;
      color: #666;
    }
    
    .no-components {
      padding: 20px;
      text-align: center;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <button class="scan-button" id="scanButton">
        <span>Scan for Foreign Components</span>
      </button>
    </div>
    <div class="content" id="results">
      <div id="componentList"></div>
    </div>
  </div>

  <script>
    const scanButton = document.getElementById('scanButton');
    const componentList = document.getElementById('componentList');
    
    function setLoading(isLoading) {
      if (isLoading) {
        scanButton.disabled = true;
        scanButton.innerHTML = `
          <div class="loading-spinner"></div>
          <span>Scanning...</span>
        `;
      } else {
        scanButton.disabled = false;
        scanButton.innerHTML = '<span>Scan for Foreign Components</span>';
      }
    }
    
    function toggleSection(sectionId) {
      const section = document.getElementById(sectionId);
      const content = section.querySelector('.library-content');
      const isHidden = content.style.display === 'none';
      content.style.display = isHidden ? 'block' : 'none';
    }
    
    scanButton.onclick = () => {
      setLoading(true);
      componentList.innerHTML = '';
      parent.postMessage({ pluginMessage: { type: 'find-components' } }, '*');
    };

    onmessage = (event) => {
      const message = event.data.pluginMessage;
      
      if (message.type === 'foreign-components-found') {
        setLoading(false);
        componentList.innerHTML = '';
        
        if (!message.components || message.components.length === 0) {
          componentList.innerHTML = '<div class="no-components">No foreign components found</div>';
          return;
        }
        
        // Group components by library and master component
        const groupedComponents = message.components.reduce((acc, component) => {
          const libraryName = component.libraryName || 'Unknown Library';
          const masterComponent = component.sourceComponentSet || 'Other Components';
          
          if (!acc[libraryName]) {
            acc[libraryName] = {};
          }
          if (!acc[libraryName][masterComponent]) {
            acc[libraryName][masterComponent] = [];
          }
          acc[libraryName][masterComponent].push(component);
          return acc;
        }, {});
        
        // Create DOM elements for grouped components
        Object.entries(groupedComponents).forEach(([libraryName, masterComponents], libraryIndex) => {
          const librarySection = document.createElement('div');
          librarySection.className = 'library-section';
          
          const totalInstances = Object.values(masterComponents)
            .flat()
            .length;
          
          librarySection.innerHTML = `
            <div class="library-header" onclick="toggleSection('library-${libraryIndex}')">
              <span>${libraryName}</span>
              <span class="count-badge">${totalInstances}</span>
            </div>
            <div class="library-content" id="library-${libraryIndex}">
            </div>
          `;
          
          const libraryContent = librarySection.querySelector('.library-content');
          
          Object.entries(masterComponents).forEach(([masterName, instances]) => {
            const masterDiv = document.createElement('div');
            masterDiv.className = 'master-component';
            masterDiv.textContent = `${masterName} (${instances.length})`;
            
            const instanceList = document.createElement('ul');
            instanceList.className = 'instance-list';
            
            instances.forEach(instance => {
              const li = document.createElement('li');
              li.className = 'instance-item';
              li.onclick = () => {
                parent.postMessage({
                  pluginMessage: {
                    type: 'select-component',
                    id: instance.id
                  }
                }, '*');
              };
              
              li.innerHTML = `
                <div class="instance-name">${instance.name}</div>
                <div class="instance-path">${instance.path}</div>
              `;
              
              instanceList.appendChild(li);
            });
            
            libraryContent.appendChild(masterDiv);
            libraryContent.appendChild(instanceList);
          });
          
          componentList.appendChild(librarySection);
        });
      }
    };
    
    // Tell the plugin we're ready to be resized
    parent.postMessage({ pluginMessage: { type: 'resize' } }, '*');
  </script>
</body>
</html>
