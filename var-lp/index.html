<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Varmeta — Premier AI Consulting & Enterprise Blockchain Partner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #1078f3;
      --blue-dark: #0a5cc7;
      --dark: #1d1d1d;
      --mid: #414651;
      --muted: #5e5e5e;
      --light-bg: #eef8ff;
      --border: #d5d7da;
      --white: #fff;
      --navy: #0a1628;
      --font: 'Plus Jakarta Sans', -apple-system, sans-serif;
      --gray-950: #181818;
      --gray-900: #1d1d1d;
      --gray-800: #373737;
      --gray-700: #494949;
      --gray-600: #5e5e5e;
      --gray-500: #787878;
      --gray-400: #a9a9a9;
      --gray-300: #d7d7d7;
      --gray-200: #eaeaea;
      --gray-100: #f2f2f2;
      --gray-50: #fafafa;
      --gray-25: #fcfcfc;
      --brand-600: #1078f3;
      --brand-700: #1567e0;
      --brand-500: #339dfe;
      --brand-400: #59bcff;
      --brand-300: #8ed5ff;
      --brand-200: #bce5ff;
      --brand-100: #d9f0ff;
      --brand-50: #eef8ff;
      --brand-25: #f4f9ff;
      --success: #17b169;
      --error: #f04437;
      --warning: #f78f08;
      --info: #2e90fa;
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font);
      color: var(--dark);
      background: var(--white);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    a { text-decoration: none; color: inherit; }
    button { cursor: pointer; border: none; background: none; font-family: var(--font); }
    input, textarea, select { font-family: var(--font); }
    @keyframes marquee {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(32px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse-dot {
      0%, 100% { box-shadow: 0 0 0 0 rgba(16,120,243,0.4); }
      50% { box-shadow: 0 0 0 8px rgba(16,120,243,0); }
    }
    .fade-in { animation: fadeInUp 0.7s ease forwards; }
    .fade-in-2 { animation: fadeInUp 0.7s 0.15s ease both; }
    .fade-in-3 { animation: fadeInUp 0.7s 0.3s ease both; }
    .nav-link { font-size: 14px; font-weight: 500; color: #414651; white-space: nowrap; transition: color 200ms; }
    .nav-link:hover { color: #1078f3; }
    .btn-primary { background: #1078f3; color: #fff; padding: 12px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; border: 2px solid rgba(255,255,255,0.12); cursor: pointer; transition: background 200ms; white-space: nowrap; }
    .btn-primary:hover { background: #0a5cc7; }
    .btn-primary-lg { background: #1078f3; color: #fff; padding: 14px 26px; border-radius: 8px; font-size: 16px; font-weight: 600; border: 2px solid rgba(255,255,255,0.12); cursor: pointer; transition: background 200ms; }
    .btn-primary-lg:hover { background: #0a5cc7; }
    .btn-secondary-lg { background: #fff; color: #414651; padding: 14px 26px; border-radius: 8px; font-size: 16px; font-weight: 600; border: 1px solid #d5d7da; cursor: pointer; transition: background 200ms; }
    .btn-secondary-lg:hover { background: #f5f7fa; }
    .service-card { padding: 24px; border: 1px solid #eef0f3; border-radius: 12px; background: #fff; transition: box-shadow 200ms, border-color 200ms; }
    .service-card:hover { box-shadow: 0 8px 24px rgba(16,120,243,0.08); border-color: #93c5fd; }
    .case-card { border: 1px solid #eef0f3; border-radius: 16px; padding: 32px; display: flex; flex-direction: column; gap: 16px; transition: box-shadow 200ms; }
    .case-card:hover { box-shadow: 0 12px 40px rgba(0,0,0,0.08); }
    .blog-card { border: 1px solid #eef0f3; border-radius: 16px; overflow: hidden; cursor: pointer; transition: box-shadow 200ms, transform 200ms; }
    .blog-card:hover { box-shadow: 0 12px 40px rgba(0,0,0,0.08); transform: translateY(-4px); }
    .faq-item { border: 1px solid #eef0f3; border-radius: 12px; overflow: hidden; margin-bottom: 4px; }
    .footer-link { display: block; font-size: 13px; color: #64748b; margin-bottom: 10px; transition: color 200ms; }
    .footer-link:hover { color: #94a3b8; }
    .tag-badge { font-size: 11px; font-weight: 600; color: #1078f3; background: #eff6ff; padding: 4px 10px; border-radius: 100px; white-space: nowrap; }
    [data-animate] { opacity: 0; transform: translateY(24px); transition: opacity 0.6s ease, transform 0.6s ease; }
    [data-animate].visible { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>
<div id="root"></div>

<!-- Animation data: large inlined strings (plain JS, no Babel needed) -->
<script src="sections/animation-data.js"></script>

<!-- Section components: each file is a self-contained Babel/JSX block -->
<script type="text/babel" src="sections/00-shared.js"></script>
<script type="text/babel" src="sections/01-navbar.js"></script>
<script type="text/babel" src="sections/02-hero.js"></script>
<script type="text/babel" src="sections/03-logo-partner.js"></script>
<script type="text/babel" src="sections/04-tech-expertise.js"></script>
<script type="text/babel" src="sections/05-how-we-work.js"></script>
<script type="text/babel" src="sections/06-real-results.js"></script>
<script type="text/babel" src="sections/07-testimonials.js"></script>
<script type="text/babel" src="sections/08-lead-magnet.js"></script>
<script type="text/babel" src="sections/09-industry-insights.js"></script>
<script type="text/babel" src="sections/10-global-partnerships.js"></script>
<script type="text/babel" src="sections/11-faq.js"></script>
<script type="text/babel" src="sections/12-footer.js"></script>

<!-- App shell: assembles all sections, runs IntersectionObserver -->
<script type="text/babel">
function App() {
  useEffect(() => {
    const io = new IntersectionObserver(
      entries => entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); io.unobserve(e.target); } }),
      { threshold: 0.1 }
    );
    document.querySelectorAll('[data-animate]').forEach(el => io.observe(el));
    return () => io.disconnect();
  }, []);
  return (
    <React.Fragment>
      <Navbar />
      <Hero />
      <LogoPartner />
      <TechExpertise />
      <HowWeWork />
      <RealResults />
      <Testimonials />
      <LeadMagnet />
      <IndustryInsights />
      <GlobalPartnerships />
      <FAQ />
      <Footer />
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
